<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Edge Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ————— Sunlit editorial: warm paper, forest green, olive, tan, brick ————— */
:root{
  --paper:#f3ede0;        /* warm cream */
  --paper2:#ede5d3;       /* deeper cream */
  --card:#faf6ec;         /* card surface */
  --ink:#26221a;          /* warm near-black */
  --ink-2:#5c5546;        /* warm gray-brown */
  --ink-3:#8a8271;        /* faint */
  --green:#2f5233;        /* deep forest */
  --green-2:#48693f;      /* leaf */
  --olive:#75774a;
  --tan:#b39868;
  --tan-line:#d8cbaf;     /* hairline borders */
  --brick:#a6432e;        /* accent / best-bet */
  --brick-soft:#f0dcd4;
  --r:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; color:var(--ink);
  font-family:'Instrument Sans',system-ui,sans-serif;
  font-size:16px; line-height:1.65;
  background:
    radial-gradient(900px 480px at 85% -6%, rgba(72,105,63,.10), transparent 62%),
    radial-gradient(720px 420px at -8% 12%, rgba(179,152,104,.14), transparent 58%),
    var(--paper);
  padding-bottom:72px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px; margin:0 auto; padding:0 22px}
h1,h2,h3{font-family:'Fraunces',serif; line-height:1.1; margin:0; letter-spacing:-.01em}
.mono{font-family:'Spline Sans Mono',monospace}
a{color:var(--green); text-decoration:none}

/* ————— Masthead ————— */
.hero{border-bottom:2px solid var(--ink); padding:44px 0 26px; position:relative}
.hero .eyebrow{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.24em;
  text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:10px}
.hero .eyebrow::before{content:""; width:26px; height:2px; background:var(--brick)}
.hero h1{font-size:clamp(36px,6.4vw,58px); font-weight:600; margin:14px 0 8px}
.hero h1 em{font-style:italic; color:var(--green)}
.hero .sub{font-size:clamp(15px,2.1vw,18px); color:var(--ink-2); max-width:620px; margin:0}
.hero .stamp{margin-top:18px; display:flex; flex-wrap:wrap; gap:8px}
.chip{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-2);
  background:var(--card); border:1px solid var(--tan-line); border-radius:999px; padding:5px 12px}
.chip b{color:var(--ink)}

/* ————— Report card strip (optional) ————— */
.rc{display:flex; flex-wrap:wrap; gap:10px 22px; align-items:baseline; margin-top:26px;
  background:var(--card); border:1px solid var(--tan-line); border-left:4px solid var(--olive);
  border-radius:var(--r); padding:14px 18px}
.rc .t{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--olive)}
.rc .rec{font-family:'Fraunces',serif; font-size:20px; font-weight:600}
.rc .note{font-size:13.5px; color:var(--ink-2); flex-basis:100%}

/* ————— Mode tabs (All books vs Prediction markets only) ————— */
.tabs{display:flex; gap:8px; margin-top:26px}
.tab{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  border:1.5px solid var(--tan-line); background:var(--card); color:var(--ink-2);
  border-radius:999px; padding:8px 16px; cursor:pointer}
.tab.on{border-color:var(--green); background:var(--green); color:#fff}
.tab:focus-visible{outline:2px solid var(--brick); outline-offset:2px}
.pm-note{font-size:13px; color:var(--ink-3); margin-top:8px}
.sport-tag{font-family:'Spline Sans Mono',monospace; font-size:10.5px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--olive); border:1px solid var(--tan-line);
  border-radius:5px; padding:2px 8px}
.nopm{font-size:14px; color:var(--ink-3); font-style:italic; padding:6px 0}

/* ————— Match cards ————— */
.games{display:grid; gap:34px; margin-top:38px}
.game{background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35);
  opacity:0; transform:translateY(14px); animation:rise .55s ease forwards; overflow:hidden}
@keyframes rise{to{opacity:1; transform:none}}
.g-head{padding:24px 26px 18px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(179,152,104,.08), transparent)}
.g-head .when{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.g-head h2{font-size:clamp(24px,4vw,34px); font-weight:600; margin-top:6px}
.g-head h2 .at{color:var(--tan); font-style:italic; font-weight:400; padding:0 4px}
.badge-live{display:inline-flex; align-items:center; gap:7px; font-family:'Spline Sans Mono',monospace;
  font-size:10.5px; font-weight:600; letter-spacing:.1em; color:#fff; background:var(--brick);
  border-radius:999px; padding:4px 11px}
.badge-live .dot{width:7px;height:7px;border-radius:50%;background:#fff; animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.livestate{margin-top:10px; font-family:'Spline Sans Mono',monospace; font-size:13px; color:var(--brick);
  background:var(--brick-soft); border-radius:9px; padding:8px 12px; display:inline-block}

.g-body{padding:6px 26px 24px}
.blk{padding:18px 0; border-bottom:1px solid var(--tan-line)}
.blk:last-child{border-bottom:none}
.blk .k{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.2em;
  text-transform:uppercase; color:var(--green); margin-bottom:9px; display:flex; align-items:center; gap:9px}
.blk .k::after{content:""; flex:1; height:1px; background:var(--tan-line)}
.blk .v{font-size:15px; color:var(--ink-2)}
.blk .v b, .blk .v strong{color:var(--ink)}
.blk .v p{margin:0 0 10px} .blk .v p:last-child{margin-bottom:0}
.blk.script .v{font-size:15.5px}
.blk.alt .k{color:var(--olive)}
.alt-branch{background:var(--paper2); border-left:3px solid var(--olive); border-radius:0 10px 10px 0;
  padding:11px 15px; margin:9px 0; font-size:14.5px; color:var(--ink-2)}
.alt-branch b{color:var(--ink)}

/* ————— The board (bets) ————— */
.blk.board .k{color:var(--brick)}
.bets{display:grid; gap:12px; margin-top:2px}
.bet{border:1px solid var(--tan-line); border-radius:12px; padding:15px 17px; background:var(--paper)}
.bet.best{border-color:var(--brick); border-width:1.5px; background:linear-gradient(180deg, rgba(166,67,46,.05), transparent), var(--paper)}
.bet-top{display:flex; justify-content:space-between; gap:14px; align-items:baseline; flex-wrap:wrap}
.bet-top .name{font-family:'Fraunces',serif; font-size:18px; font-weight:600}
.bet-top .price{font-family:'Spline Sans Mono',monospace; font-weight:700; font-size:17px; color:var(--green); white-space:nowrap}
.bet-top .price small{font-weight:400; color:var(--ink-3); font-size:11.5px; margin-left:6px}
.flag{display:inline-block; font-family:'Spline Sans Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; border-radius:5px; padding:3px 8px; margin-right:9px; vertical-align:2px}
.flag.best{background:var(--brick); color:#fff}
.flag.strong{background:var(--green); color:#fff}
.flag.value{background:transparent; color:var(--olive); border:1.5px solid var(--olive)}
.flag.flyer{background:transparent; color:var(--tan); border:1.5px solid var(--tan)}
.legs{list-style:none; margin:10px 0 2px; padding:0}
.legs li{padding:5px 0 5px 20px; position:relative; font-size:14.5px; color:var(--ink-2); border-bottom:1px dashed var(--tan-line)}
.legs li:last-child{border-bottom:none}
.legs li::before{content:"+"; position:absolute; left:2px; color:var(--brick); font-weight:700}
.bet-meta{margin-top:10px; display:grid; gap:6px}
.bet-meta .m{font-size:13.5px; color:var(--ink-2); padding-left:86px; position:relative}
.bet-meta .m .lbl{position:absolute; left:0; top:1px; font-family:'Spline Sans Mono',monospace; font-size:10px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.bet-meta .m.edge .lbl{color:var(--green)}
.bet-meta .m.edge{font-family:'Spline Sans Mono',monospace; font-size:12.5px; color:var(--green-2)}

/* ————— Futures board ————— */
.futures{margin-top:34px; background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35); overflow:hidden}
.futures .f-head{padding:20px 26px 14px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(47,82,51,.06), transparent)}
.futures .f-head h2{font-size:clamp(20px,3.4vw,28px); font-weight:600}
.futures .f-head .sub{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-3); margin-top:4px}
.futures .f-body{padding:14px 26px 22px}
.f-horizon{font-family:'Spline Sans Mono',monospace; font-size:10.5px; color:var(--ink-3)}

/* ————— Footer ————— */
footer{margin-top:52px; border-top:2px solid var(--ink); padding-top:22px}
.disclaimer{font-size:13px; color:var(--ink-3); line-height:1.6}
.disclaimer b{color:var(--ink-2)}

@media(max-width:640px){
  .g-head, .g-body{padding-left:18px; padding-right:18px}
  .bet-meta .m{padding-left:0; padding-top:16px}
  .bet-meta .m .lbl{top:0}
}
</style>
</head>
<body>
<header class="hero"><div class="wrap">
  <div class="eyebrow" id="hero-eyebrow">World Cup 2026</div>
  <h1>The <em>Edge</em> Report</h1>

  <div class="stamp" id="hero-stamp"></div>

</div></header>

<main class="wrap" id="app"></main>

<footer class="wrap"><div class="disclaimer" id="disclaimer"></div></footer>

<script>
/* DATA is injected below. Schema (per RUNBOOK-morning.md step 5):
   meta{eyebrow, heroSub, chips[], disclaimer}

   Concluded games are OMITTED entirely (not rendered as reference). */
const DATA = {"meta": {"eyebrow": "World Cup 2026 · Round of 16 — plus Wimbledon R4", "heroSub": "Sunday, July 5 — Brazil–Norway at MetLife, then Mexico–England at a hostile, 7,350-foot Azteca. Wimbledon's second week gives us a live mispricing and two coin-flips. The shots-volume family (3-for-3 across three days) is the spine again; almost everything else on the board is priced fair and we say so.", "chips": ["2 WC Round-of-16 ties", "4 Wimbledon R4 matches", "Odds pulled 10:45–11:00 AM ET", "Model: 0.55 market / 0.35 PELE / 0.10 Poisson + fresh research", "Storm risk at BOTH WC venues"], "disclaimer": "For entertainment. Edges are our independent projection vs. the de-vigged price — most of this slate is fairly priced and we say so. Lineups are PROJECTED until ~75 min pre-kick; re-confirm before staking. Live prices move by the minute — reprice before you bet. 21+, legal books only, only what you can afford to lose."}, "reportCard": {"record": "Yesterday 2-6", "roi": "−0.33u (−11.8%)", "note": "Both winners were the shot-volume family again — Jonathan David O2.5 shots (+170) and the Morocco ML + David shots SGP at the +330 floor. The Canada regulation lean was flat wrong, and both France assist props died to a penalty-only script (a lesson now encoded: no pure assists in sub-2.5-total games)."}, "games": [{"sport": "Wimbledon", "matchup": "Novak Djokovic vs Roman Safiullin", "venue": "Centre Court, Wimbledon · Men's R4", "ko": "LIVE — resumable view at pick time", "status": "LIVE", "liveState": "Djokovic leads 7-6(6), 6-3 · 3rd set in progress (as of ~11:00 AM ET)", "lineups": "<p>No injury flags either side, no MTOs. Safiullin held two set points at 5-4 in the first — Djokovic broke back, took the tiebreak 8-6 and ran away with set two. H2H 3-0 Djokovic, all straight sets; grass Elo gap ~300 points (1925 vs 1627).</p>", "script": "<p><b>The edge came and went while we verified it.</b> At 10:52 AM Kalshi still traded Djokovic at 93c while he led by two sets — a clean ~5-point live-pricing lag against a fair ~98%. By 11:00 the ask was 96c, and at 96 the remaining 2 points no longer cover the real tail: Kalshi's tennis rules settle a mid-match retirement on whoever officially advances (no void), so a Djokovic injury pays Safiullin. <b>Pass at 96c</b> — but this is the pattern to keep watching live: Kalshi's tennis books lag scoreboard states by minutes, and two-sets-up favorites are recurrently cheap.</p>", "bets": []}, {"sport": "Wimbledon", "matchup": "Félix Auger-Aliassime vs Alejandro Davidovich Fokina", "venue": "No.1 Court, Wimbledon · Men's R4", "ko": "LIVE — started 10:50 AM ET", "status": "LIVE", "liveState": "Early 1st set at pick time (~10:55 AM ET) — price still at pre-match level", "lineups": "<p>Both fresh, both flag-free, both through in straight sets. FAA: 91% first-serve points and 10 aces vs Zheng — but he blew 3 match points from in front in the Halle QF. ADF: the 'weak on grass' tag is dead — <b>Mallorca champion (first career title, on grass)</b>, 14 of his last 15 grass sets won. H2H 3-1 FAA (never on grass).</p>", "script": "<p><b>A pick that died in verification — shown for honesty.</b> The draft case: grass Elo calls these two peers (1789 vs 1782), ADF just won Mallorca on grass with 14 of his last 15 grass sets, and at 39c the market seemed to be pricing the seed, not the form. The adversarial pass killed it: the H2H input was factually wrong (ATP official: <b>4-1 Auger-Aliassime</b>, not 3-1 ADF), correcting it drags our number to ~40 — exactly the market — and the house rule is to defer to the price when the nameable reason evaporates. No bet.</p>", "bets": []}, {"sport": "Wimbledon", "matchup": "Aryna Sabalenka vs Naomi Osaka", "venue": "Centre Court, Wimbledon · Women's R4", "ko": "Sun Jul 5 · ~11:30 AM ET (2nd on Centre)", "status": "PRE", "lineups": "<p>Sabalenka: no sets dropped, no long matches, a 21-straight-slam-tiebreak win streak (Open Era record), 4th straight Wimbledon QF bid. Osaka: first career Wimbledon R4, three quick straight-set wins, serving huge — but she <b>retired with a foot injury in the Bad Homburg final eight days ago</b> (no visible effect since; flag noted). H2H 4-1 Sabalenka, 3-0 in 2026 (one set dropped total). First meeting on grass.</p>", "script": "<p>Grass Elo (1987 vs 1793) says ~75%, the 2026 head-to-head says Sabalenka keeps winning the big points against exactly this opponent, and the market says 68.5. Our number, haircut for Osaka's genuinely elite serve week: ~71. That's thin — a small-stake lean, not a stand. The shape (both holding 80%+) points to tight sets decided in breakers, where Sabalenka's record is historic.</p>", "bets": [{"kind": "single", "tier": "value", "label": "Aryna Sabalenka to win", "price": "69c<small>KXWTAMATCH</small>", "book": "Kalshi", "pm": true, "pmNote": "69c<small>KXWTAMATCH-26JUL05SABOSA · Sabalenka</small>", "mustBeTrue": "Sabalenka's big-point edge holds: 21 straight Grand Slam tiebreaks won, 3-0 vs Osaka in 2026, and no fatigue in her legs (no sets dropped).", "edge": "model ~71% vs 69c ask (+2, thin). Grass Elo has it 75 — we haircut for Osaka's serve week, and it still clears."}]}, {"sport": "Wimbledon", "matchup": "Coco Gauff vs Belinda Bencic", "venue": "No.1 Court, Wimbledon · Women's R4", "ko": "Sun Jul 5 · ~12:30 PM ET", "status": "PRE", "lineups": "<p>Gauff: two straight three-set escapes (blew 3 match points vs Liu, 6 double faults, 2h25m), 0-3 career in Wimbledon R4s, grass return game just 33% this season — but she's won the last 3 H2H meetings (5-2 overall; all on hard/clay). Bencic: 2025 Wimbledon semifinalist, back from a 3-hour war with Kalinskaya. Both played long matches in R3 — fatigue is a wash.</p>", "script": "<p>A genuine coin flip the market has right: Kalshi 51.5/48.5, grass Elo near-parity, the H2H pulling one way and the grass pedigree the other. Our number lands 52–54 Gauff — inside the vig. <b>No play passes the bar</b>; the honest board here is empty. If you must have a shape, the both-hold-80%+ serve profiles point to long sets, not an ML side.</p>", "bets": []}, {"sport": "World Cup", "matchup": "Brazil vs Norway", "venue": "MetLife Stadium, East Rutherford NJ (open-air)", "ko": "Sun Jul 5 · 4:00 PM ET · Round of 16", "status": "PRE", "lineups": "<p><b>PROJECTED XIs (lock ~2:45 PM ET — re-confirm before staking).</b> <b>Brazil:</b> Alisson; Danilo, Marquinhos, Gabriel Magalhães, Douglas Santos; Casemiro, Bruno Guimarães, +1 (Danilo S./Martinelli/Endrick — the open Paquetá slot); Rayan, Matheus Cunha, Vinícius Júnior. <b>Paquetá OUT</b> (thigh). <b>Raphinha bench-only</b> (Ancelotti: “not at 100%”). <b>Neymar fit for 90 but projected bench</b> — super-sub and penalties option. Casemiro and Danilo are each one yellow from missing the QF. <b>Norway:</b> Nyland; Pedersen, Ajer, Heggem, Møller Wolfe; Ødegaard, Berge, Berg; Sørloth, Haaland, Nusa. <b>Ryerson (RB) still out</b> — Pedersen deputizes directly against Vinícius. Haaland fully fit: goals in all 3 starts, 13 straight internationals with a goal. Weather: 86°F, humid, <b>60% thunderstorms from ~4 PM</b> — real delay risk at an open-air venue. Crowd: NJ's 50–60k Brazilians make this a de-facto Brazil home game.</p>", "script": "<p>The market makes Brazil 53.7% in 90 (Kalshi fair; DK identical), and for once our model, the fresh Opta number (54.2/24.0/21.8, published this morning) and the price all agree — the PELE snapshot's friendlier Norway read (24.6%) predates the two facts that decide this game's shape. First: Norway's right side is still broken. Ryerson hasn't played since the Senegal game and Pedersen, a stand-in, now meets the tournament's xG leader (Vinícius: 3.87 xG, 10 shots on target, 18 carries into the box). Second: Norway's full-strength R32 was a warning, not a springboard — outshot 14–9 by Ivory Coast, ~2.0 xG conceded, rescued by an 86th-minute Haaland goal and a stoppage-time Nyland save. Norway have scored <i>and</i> conceded in all four games; Brazil have the tournament's most efficient attack (fewest shots per game of any Brazil side on record, but the highest xG per shot). The primary script is Brazil controlling territory against a mid-block, working Vinícius at Pedersen, and Norway living on direct balls to Haaland — who has never taken fewer than 4 shots in a start this tournament and gets more, not fewer, when Norway chase.</p><p>Where we differ from the market is almost nowhere on the headline lines — so the board below concentrates on the one family with a repeatable, mechanism-backed edge: shot volume. Haaland's and Vinícius's shots ladders are priced off season-average baselines, not off this specific script (a broken RB on one side, a chasing #9 with a 4.7 shots/game floor on the other). BTTS-Yes at 62.5% looks aggressive against Brazil's 2-conceded-in-4, but Norway's per-game concede-and-score record validates the direction — we pass rather than fade it.</p>", "altFutures": ["<b>If Norway score first</b> (they've scored in every match): Brazil's price lengthens while the fundamentals don't move — Brazil live ML becomes the value, and Vinícius/Cunha shots overs get cheaper in-play.", "<b>If thunderstorms force a long delay:</b> legs tighten and tempo drops on resumption — live unders and the draw firm up; avoid pre-placing weather-exposed live positions.", "<b>If it reaches 75+ minutes level:</b> remember the clock — 90-min lines die at the whistle; only to-advance (BRA −245 / NOR +195) pays through ET and pens."], "bets": [{"kind": "single", "tier": "best", "label": "Erling Haaland Over 3.5 shots (regulation)", "price": "+105", "book": "DraftKings", "pm": false, "mustBeTrue": "Haaland starts (void if not in the confirmed XI ~2:45 PM ET) and gets his usual volume — he has never taken fewer than 4 shots in a start this tournament (5, 5, 4).", "edge": "model ~53% vs implied 48.8% (+4 pts). The shots-volume family is 3-for-3 across three separate days — it stays the spine."}, {"kind": "sgp", "tier": "strong", "label": "SGP: Brazil ML (regulation) + Haaland Over 2.5 shots", "price": "+135 floor", "book": "DraftKings SGP — HARD floor +135; pass below", "pm": false, "legs": ["Brazil to win in 90 (−130 standalone)", "Haaland Over 2.5 shots (−250 standalone)"], "correlation": "Positively correlated: Brazil leading is exactly the state that makes Norway chase through Haaland — the same cross-team template that cashed Jul 2 (Yamal) and Jul 4 (Morocco ML + David shots).", "mustBeTrue": "DK quotes ≥ +135 (naive product is +148; at +135 the model edge is thin — one tick worse is −EV) and Haaland starts.", "edge": "joint model ~43% vs 42.6% breakeven at the floor — template EV, price-disciplined."}, {"kind": "single", "tier": "value", "label": "Vinícius Júnior Over 3.5 shots (regulation)", "price": "+125", "book": "DraftKings", "pm": false, "mustBeTrue": "Vinícius starts (void if not in XI). Blowout-early-sub is the tail risk — that's why this is a quarter unit.", "edge": "model ~50% vs implied 44.4% (+5.6). Tournament xG leader (3.87), 10 SOT, 18 box carries, aimed all night at a stand-in right-back."}, {"kind": "longshot", "tier": "flyer", "label": "Gabriel Magalhães anytime scorer", "price": "+1400", "book": "DraftKings", "pm": false, "mustBeTrue": "Gabriel starts (void if benched) and Brazil generate their usual corner volume — Norway conceded 14 corners to Ivory Coast last round.", "edge": "model ~7% vs de-vig ~5%. The Enciso/Diop lesson: elite set-piece CBs at 14/1 are systematically underpriced; this one is on the corner-dominant favorite."}]}, {"sport": "World Cup", "matchup": "Mexico vs England", "venue": "Estadio Banorte (Azteca), Mexico City · 7,350 ft", "ko": "Sun Jul 5 · 8:00 PM ET · Round of 16", "status": "PRE", "lineups": "<p><b>PROJECTED XIs (lock ~6:45 PM ET).</b> <b>Mexico:</b> Rangel; Sánchez, Montes, Vásquez, Gallardo; Romo, Lira, Mora; Alvarado, Jiménez, Quiñones. <b>Zero injuries, zero suspensions, zero card risk</b> — the only debates are 17-year-old Mora vs Gutiérrez, and Montes vs a not-match-fit Edson Álvarez. Jiménez is the locked #9 (Giménez is a bench option). <b>England (Tuchel):</b> Pickford; Spence, Konsa, Guehi, O'Reilly; Rice, Anderson; Saka, Bellingham, Gordon; Kane. <b>Kane starts — undisputed</b> (Toney/Watkins are designated bench finishers). Reece James (hamstring) likely out; Rice passed fit but carrying a hamstring niggle; <b>Bellingham is one yellow from missing a QF</b>. Weather: <b>80–100% evening thunderstorms</b> (FIFA considered moving kickoff); the Jun 30 Azteca game was delayed an hour. 87,000 inside, riot police outside England's hotel, and an organized overnight noise campaign — Ecuador got the same treatment and lost 2-0.</p>", "script": "<p>This is the closest big-name line of the round — England 39.3 / Mexico 31.3 / Draw 29.4 (Kalshi fair), England just 52.6/47.4 to advance — and the altitude is why. The mechanism is empirically real, not folklore: non-acclimatized sides at Azteca this tournament show 3–9% less total distance and a <b>21% drop in high-velocity running</b>; Ecuador's Caicedo ran 16% less high-speed than his prior match; Mexico have out-sprinted every visitor and won all three Azteca games 2-0, 3-0, 2-0 with four clean sheets overall (8 GF / 0 GA). England played every prior game at sea level, landed Friday, and Tuchel has spent the week saying adaptation is 'impossible' in four days. The stale PELE snapshot makes Mexico ~56% to advance; the market and this morning's Opta (55.6/44.4 England) say the opposite — and our research verdict splits it: every ingredient of the Mexico case is confirmed and fresh, but England's attack is functioning (8 goals, Kane 5 + a tournament-leading 10 shots on target) and Mexico haven't yet beaten anyone of England's class. We land near the market on the winner and spend our bullets on the game's <i>shape</i> instead.</p><p>The shape read: altitude punishes sustained pressing hardest — Tuchel's own words, 'the first 15–20 minutes will be maybe the toughest' — so expect England to sit deeper than usual, a game that lives in the middle third, and a total throttled the way all three Azteca games have been (avg 2.33 goals). Both major previews project one-goal margins or 1-1. That makes the Draw at ~30c and the Under the honest expressions, plus Kane as England's entire out-ball (pens, headers, everything runs through him) and Quiñones running at England's one structural weakness: a makeshift right-back with James out.</p>", "altFutures": ["<b>If England score early</b> (their best window is before the oxygen debt bites, ~first 25 min): Mexico must open up for the first time all tournament — live England ML and Kane multi-shots cash cheaper, and the Under dies.", "<b>If it's level at 60'</b>: the altitude math compounds against England — live Mexico ML and the Draw both firm; England's bench (Toney/Watkins/Rashford) becomes their script, which favors Kane knock-downs but not build-up play.", "<b>If storms suspend play:</b> a long delay resets legs and helps the non-acclimatized side disproportionately — a quiet England buy-signal live.", "<b>To-advance is the only shootout-proof market</b> — England −125 / Mexico +100. A Mexico side that hasn't conceded in four games dragging this to pens is the single most PELE-friendly path."], "bets": [{"kind": "single", "tier": "best", "label": "Harry Kane Over 3.5 shots (regulation)", "price": "+145", "book": "DraftKings", "pm": false, "mustBeTrue": "Kane starts (confirmed-intent starter; void if not in XI at ~6:45 PM ET). Script-robust: cashes whether England dominate or chase — the card's hedge against an England win.", "edge": "model ~46% vs implied 40.8% (+5.2). Tournament leader with 10 shots on target; every England out-ball (pens, headers, knock-downs) routes through him."}, {"kind": "single", "tier": "strong", "label": "Under 2.5 goals (regulation) — buy NO on Kalshi Over 2.5", "price": "61c<small>KXWCTOTAL NO O2.5</small>", "book": "Kalshi", "pm": true, "pmNote": "61c<small>KXWCTOTAL-26JUL05MEXENG · NO on Over 2.5</small>", "mustBeTrue": "The Azteca pattern holds: all three Mexico games there finished 2-0/3-0/2-0 (avg 2.33), Mexico haven't conceded all tournament, and evening thunderstorms throttle tempo further.", "edge": "model ~63.5% vs 61c ask (+2.5). Triple mechanism: altitude press-suppression, storm risk, a 0-GA home side."}, {"kind": "single", "tier": "value", "label": "Draw (90 minutes)", "price": "30c<small>KXWCGAME Tie</small>", "book": "Kalshi ONLY — DK +215 carries no edge", "pm": true, "pmNote": "30c<small>KXWCGAME-26JUL05MEXENG · Tie</small>", "mustBeTrue": "A cagey, altitude-throttled 90 that reaches extra time — both major previews project 1-1 or a one-goal grind.", "edge": "model ~31.5% vs 30c (+1.5, thin — quarter unit). Kalshi-only: the DK price (+215, 31.7% breakeven) is already at our number."}, {"kind": "sgp", "tier": "value", "label": "SGP: Mexico ML (regulation) + Kane Over 2.5 shots", "price": "+550 floor", "book": "DraftKings SGP — HARD floor +550; pass below", "pm": false, "legs": ["Mexico to win in 90 (+210 standalone)", "Harry Kane Over 2.5 shots (−170 standalone)"], "correlation": "The template mirrored: a Mexico lead forces England to chase through their only focal point. Flagged honestly — this is dog-ML + favorite's-striker, a mirror of the validated form, not a repeat of it.", "mustBeTrue": "DK quotes ≥ +550 (naive product +658) and Kane starts.", "edge": "joint model ~15.5% vs 15.4% breakeven at the floor — template family, floor-disciplined."}, {"kind": "longshot", "tier": "value", "label": "Julián Quiñones anytime scorer", "price": "+320", "book": "DraftKings ONLY — Kalshi's 29c is above our number, never take it", "pm": false, "mustBeTrue": "Quiñones starts (void if not in XI). His left lane meets England's one structural hole: a makeshift right-back with Reece James out.", "edge": "model ~24% vs de-vig ~21% (+3). Three goals in four games; every Mexico attack flows down his side."}]}], "futures": [{"sport": "World Cup", "label": "Argentina to win the World Cup — YES", "ticker": "KXMENWORLDCUP-26 · ARG", "price": "17c (limit ≤18c)", "tier": "strong", "mustBeTrue": "Argentina beat Egypt Tuesday (market: 84.5%) and PELE's final-round conversion is right where the market's isn't: the board prices France at 2× Argentina while PELE has them near co-favorites — a gap news doesn't explain (Messi fit, zero doubtful starters).", "edge": "conditioned PELE 24.9–26.5% vs 16.7% de-vig (+8 to +10 — the largest gap on any board)", "horizon": "Final, Jul 19"}, {"sport": "World Cup", "label": "Mexico to reach the Final — NO", "ticker": "KXWCROUND-26FINAL · MEX", "price": "~89c NO (YES 11/12)", "tier": "value", "mustBeTrue": "The co-host retail premium keeps failing to convert: Mexico are priced richer on every long-horizon ladder than the sharp per-match markets imply — including tonight (England 52.6% to advance).", "edge": "model YES 4.0–4.8% vs 11.5% implied (+6.7 to +7.4 for the NO side)", "horizon": "Semis conclude ~Jul 14; settles tonight if England advance"}]};

const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const app=document.getElementById('app');

document.getElementById('hero-eyebrow').textContent = DATA.meta.eyebrow || 'World Cup 2026';
document.getElementById('hero-sub').textContent = DATA.meta.heroSub || '';
const stamp=document.getElementById('hero-stamp');
(DATA.meta.chips||[]).forEach(c=>stamp.appendChild(el('span','chip',c)));
document.getElementById('disclaimer').innerHTML = DATA.meta.disclaimer || '';

if(DATA.reportCard){
  const rc=el('div','rc');
  rc.appendChild(el('span','t','Yesterday'));
  rc.appendChild(el('span','rec',DATA.reportCard.record||''));
  if(DATA.reportCard.roi) rc.appendChild(el('span','rec mono',DATA.reportCard.roi));
  if(DATA.reportCard.note) rc.appendChild(el('div','note',DATA.reportCard.note));
  document.getElementById('rc-slot').appendChild(rc);
}

const TIER_ORDER={best:0,strong:1,value:2,flyer:3};
const TIER_LABEL={best:'Best Bet',strong:'Strong',value:'Value',flyer:'Flyer'};

function renderBet(x, pmMode){
  const card=el('div','bet'+(x.tier==='best'?' best':''));
  const top=el('div','bet-top');
  const nm=el('div','name');
  nm.appendChild(el('span','flag '+x.tier,TIER_LABEL[x.tier]||x.tier));
  nm.appendChild(document.createTextNode(x.label));
  top.appendChild(nm);
  const priceTxt = (pmMode && x.pmNote) ? x.pmNote : (x.price+(x.book?'<small>'+x.book+'</small>':''));
  top.appendChild(el('div','price',priceTxt));
  card.appendChild(top);
  if(x.legs && x.legs.length){
    const ul=el('ul','legs'); x.legs.forEach(l=>ul.appendChild(el('li',null,l))); card.appendChild(ul);
  }
  const meta=el('div','bet-meta');
  const addM=(cls,lbl,txt)=>{const m=el('div','m '+cls); m.appendChild(el('span','lbl',lbl)); m.appendChild(document.createTextNode(' '+txt)); meta.appendChild(m);};
  if(x.correlation) addM('','Correlation',x.correlation);
  if(x.mustBeTrue) addM('','Needs',x.mustBeTrue);
  if(x.edge) addM('edge','Edge',x.edge);
  if(!pmMode && x.pm && x.pmNote) addM('','Kalshi',x.pmNote.replace(/<[^>]*>/g,''));
  if(x.horizon) addM('','Settles',x.horizon);
  card.appendChild(meta);
  return card;
}

function render(pmMode){
  app.innerHTML='';
  if(pmMode) app.appendChild(el('p','pm-note','Prediction-market mode: only Kalshi-executable plays (legal in GA/CA — no sportsbook required). Analysis unchanged.'));
  const gw=el('div','games');
  (DATA.games||[]).forEach((g,gi)=>{
    const c=el('article','game'); c.style.animationDelay=(gi*.09)+'s';
    const head=el('div','g-head');
    const when=el('div','when', g.ko+' &middot; '+g.venue);
    if(g.sport) when.appendChild(el('span','sport-tag',g.sport));
    if(g.status==='LIVE'){
      const lb=el('span','badge-live'); lb.appendChild(el('span','dot')); lb.appendChild(document.createTextNode('LIVE'));
      when.appendChild(lb);
    }
    head.appendChild(when);
    head.appendChild(el('h2',null,g.matchup.replace(/\s+(vs\.?|v|—|-)\s+/i,' <span class="at">v</span> ')));
    if(g.status==='LIVE' && g.liveState) head.appendChild(el('div','livestate',g.liveState));
    c.appendChild(head);

    const bd=el('div','g-body');
    const blk=(cls,k,vHtml)=>{const b=el('div','blk '+cls); b.appendChild(el('div','k',k)); b.appendChild(el('div','v',vHtml)); bd.appendChild(b); return b;};

    if(g.lineups) blk('','Lineups &amp; News', g.lineups);
    if(g.script)  blk('script','The Script', g.script);
    if(g.altFutures){
      const b=el('div','blk alt'); b.appendChild(el('div','k','Alternative Futures'));
      const v=el('div','v');
      (Array.isArray(g.altFutures)?g.altFutures:[g.altFutures]).forEach(a=>v.appendChild(el('div','alt-branch',a)));
      b.appendChild(v); bd.appendChild(b);
    }

    const bets = (g.bets||[]).filter(x=>!pmMode || x.pm);
    const b=el('div','blk board');
    b.appendChild(el('div','k','The Board — '+bets.length+' play'+(bets.length===1?'':'s')));
    if(bets.length){
      const list=el('div','bets');
      [...bets].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>list.appendChild(renderBet(x,pmMode)));
      b.appendChild(list);
    } else {
      b.appendChild(el('div','nopm', pmMode?'No Kalshi-executable edge in this match — analysis above still stands.':'No plays passed the edge bar.'));
    }
    bd.appendChild(b);
    c.appendChild(bd); gw.appendChild(c);
  });
  app.appendChild(gw);

  if(DATA.futures && DATA.futures.length){
    const f=el('section','futures');
    const fh=el('div','f-head');
    fh.appendChild(el('h2',null,'Futures Board'));
    fh.appendChild(el('div','sub','Tournament-level positions on Kalshi — tracked nightly in the ledger until they settle.'));
    f.appendChild(fh);
    const fb=el('div','f-body');
    const list=el('div','bets');
    [...DATA.futures].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>{
      const card=renderBet({...x, book:x.ticker, pm:true}, false);
      list.appendChild(card);
    });
    fb.appendChild(list); f.appendChild(fb); app.appendChild(f);
  }
}

// tabs
const tabs=el('div','tabs');
const tAll=el('button','tab on','All books');
const tPM=el('button','tab','Prediction markets');
tAll.onclick=()=>{tAll.classList.add('on');tPM.classList.remove('on');render(false);};
tPM.onclick=()=>{tPM.classList.add('on');tAll.classList.remove('on');render(true);};
tabs.appendChild(tAll); tabs.appendChild(tPM);
document.getElementById('rc-slot').appendChild(tabs);
render(false);
</script>

</html>
