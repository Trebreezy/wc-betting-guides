<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Edge Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ————— Sunlit editorial: warm paper, forest green, olive, tan, brick ————— */
:root{
  --paper:#f3ede0;        /* warm cream */
  --paper2:#ede5d3;       /* deeper cream */
  --card:#faf6ec;         /* card surface */
  --ink:#26221a;          /* warm near-black */
  --ink-2:#5c5546;        /* warm gray-brown */
  --ink-3:#8a8271;        /* faint */
  --green:#2f5233;        /* deep forest */
  --green-2:#48693f;      /* leaf */
  --olive:#75774a;
  --tan:#b39868;
  --tan-line:#d8cbaf;     /* hairline borders */
  --brick:#a6432e;        /* accent / best-bet */
  --brick-soft:#f0dcd4;
  --r:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; color:var(--ink);
  font-family:'Instrument Sans',system-ui,sans-serif;
  font-size:16px; line-height:1.65;
  background:
    radial-gradient(900px 480px at 85% -6%, rgba(72,105,63,.10), transparent 62%),
    radial-gradient(720px 420px at -8% 12%, rgba(179,152,104,.14), transparent 58%),
    var(--paper);
  padding-bottom:72px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px; margin:0 auto; padding:0 22px}
h1,h2,h3{font-family:'Fraunces',serif; line-height:1.1; margin:0; letter-spacing:-.01em}
.mono{font-family:'Spline Sans Mono',monospace}
a{color:var(--green); text-decoration:none}

/* ————— Masthead ————— */
.hero{border-bottom:2px solid var(--ink); padding:44px 0 26px; position:relative}
.hero .eyebrow{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.24em;
  text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:10px}
.hero .eyebrow::before{content:""; width:26px; height:2px; background:var(--brick)}
.hero h1{font-size:clamp(36px,6.4vw,58px); font-weight:600; margin:14px 0 8px}
.hero h1 em{font-style:italic; color:var(--green)}
.hero .sub{font-size:clamp(15px,2.1vw,18px); color:var(--ink-2); max-width:620px; margin:0}
.hero .stamp{margin-top:18px; display:flex; flex-wrap:wrap; gap:8px}
.chip{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-2);
  background:var(--card); border:1px solid var(--tan-line); border-radius:999px; padding:5px 12px}
.chip b{color:var(--ink)}

/* ————— Report card strip (optional) ————— */
.rc{display:flex; flex-wrap:wrap; gap:10px 22px; align-items:baseline; margin-top:26px;
  background:var(--card); border:1px solid var(--tan-line); border-left:4px solid var(--olive);
  border-radius:var(--r); padding:14px 18px}
.rc .t{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--olive)}
.rc .rec{font-family:'Fraunces',serif; font-size:20px; font-weight:600}
.rc .note{font-size:13.5px; color:var(--ink-2); flex-basis:100%}

/* ————— Mode tabs (All books vs Prediction markets only) ————— */
.tabs{display:flex; gap:8px; margin-top:26px}
.tab{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  border:1.5px solid var(--tan-line); background:var(--card); color:var(--ink-2);
  border-radius:999px; padding:8px 16px; cursor:pointer}
.tab.on{border-color:var(--green); background:var(--green); color:#fff}
.tab:focus-visible{outline:2px solid var(--brick); outline-offset:2px}
.pm-note{font-size:13px; color:var(--ink-3); margin-top:8px}
.sport-tag{font-family:'Spline Sans Mono',monospace; font-size:10.5px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--olive); border:1px solid var(--tan-line);
  border-radius:5px; padding:2px 8px}
.nopm{font-size:14px; color:var(--ink-3); font-style:italic; padding:6px 0}

/* ————— Match cards ————— */
.games{display:grid; gap:34px; margin-top:38px}
.game{background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35);
  opacity:0; transform:translateY(14px); animation:rise .55s ease forwards; overflow:hidden}
@keyframes rise{to{opacity:1; transform:none}}
.g-head{padding:24px 26px 18px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(179,152,104,.08), transparent)}
.g-head .when{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.g-head h2{font-size:clamp(24px,4vw,34px); font-weight:600; margin-top:6px}
.g-head h2 .at{color:var(--tan); font-style:italic; font-weight:400; padding:0 4px}
.badge-live{display:inline-flex; align-items:center; gap:7px; font-family:'Spline Sans Mono',monospace;
  font-size:10.5px; font-weight:600; letter-spacing:.1em; color:#fff; background:var(--brick);
  border-radius:999px; padding:4px 11px}
.badge-live .dot{width:7px;height:7px;border-radius:50%;background:#fff; animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.livestate{margin-top:10px; font-family:'Spline Sans Mono',monospace; font-size:13px; color:var(--brick);
  background:var(--brick-soft); border-radius:9px; padding:8px 12px; display:inline-block}

.g-body{padding:6px 26px 24px}
.blk{padding:18px 0; border-bottom:1px solid var(--tan-line)}
.blk:last-child{border-bottom:none}
.blk .k{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.2em;
  text-transform:uppercase; color:var(--green); margin-bottom:9px; display:flex; align-items:center; gap:9px}
.blk .k::after{content:""; flex:1; height:1px; background:var(--tan-line)}
.blk .v{font-size:15px; color:var(--ink-2)}
.blk .v b, .blk .v strong{color:var(--ink)}
.blk .v p{margin:0 0 10px} .blk .v p:last-child{margin-bottom:0}
.blk.script .v{font-size:15.5px}
.blk.alt .k{color:var(--olive)}
.alt-branch{background:var(--paper2); border-left:3px solid var(--olive); border-radius:0 10px 10px 0;
  padding:11px 15px; margin:9px 0; font-size:14.5px; color:var(--ink-2)}
.alt-branch b{color:var(--ink)}

/* ————— The board (bets) ————— */
.blk.board .k{color:var(--brick)}
.bets{display:grid; gap:12px; margin-top:2px}
.bet{border:1px solid var(--tan-line); border-radius:12px; padding:15px 17px; background:var(--paper)}
.bet.best{border-color:var(--brick); border-width:1.5px; background:linear-gradient(180deg, rgba(166,67,46,.05), transparent), var(--paper)}
.bet-top{display:flex; justify-content:space-between; gap:14px; align-items:baseline; flex-wrap:wrap}
.bet-top .name{font-family:'Fraunces',serif; font-size:18px; font-weight:600}
.bet-top .price{font-family:'Spline Sans Mono',monospace; font-weight:700; font-size:17px; color:var(--green); white-space:nowrap}
.bet-top .price small{font-weight:400; color:var(--ink-3); font-size:11.5px; margin-left:6px}
.flag{display:inline-block; font-family:'Spline Sans Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; border-radius:5px; padding:3px 8px; margin-right:9px; vertical-align:2px}
.flag.best{background:var(--brick); color:#fff}
.flag.strong{background:var(--green); color:#fff}
.flag.value{background:transparent; color:var(--olive); border:1.5px solid var(--olive)}
.flag.flyer{background:transparent; color:var(--tan); border:1.5px solid var(--tan)}
.legs{list-style:none; margin:10px 0 2px; padding:0}
.legs li{padding:5px 0 5px 20px; position:relative; font-size:14.5px; color:var(--ink-2); border-bottom:1px dashed var(--tan-line)}
.legs li:last-child{border-bottom:none}
.legs li::before{content:"+"; position:absolute; left:2px; color:var(--brick); font-weight:700}
.bet-meta{margin-top:10px; display:grid; gap:6px}
.bet-meta .m{font-size:13.5px; color:var(--ink-2); padding-left:86px; position:relative}
.bet-meta .m .lbl{position:absolute; left:0; top:1px; font-family:'Spline Sans Mono',monospace; font-size:10px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.bet-meta .m.edge .lbl{color:var(--green)}
.bet-meta .m.edge{font-family:'Spline Sans Mono',monospace; font-size:12.5px; color:var(--green-2)}

/* ————— Futures board ————— */
.futures{margin-top:34px; background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35); overflow:hidden}
.futures .f-head{padding:20px 26px 14px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(47,82,51,.06), transparent)}
.futures .f-head h2{font-size:clamp(20px,3.4vw,28px); font-weight:600}
.futures .f-head .sub{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-3); margin-top:4px}
.futures .f-body{padding:14px 26px 22px}
.f-horizon{font-family:'Spline Sans Mono',monospace; font-size:10.5px; color:var(--ink-3)}

/* ————— Footer ————— */
footer{margin-top:52px; border-top:2px solid var(--ink); padding-top:22px}
.disclaimer{font-size:13px; color:var(--ink-3); line-height:1.6}
.disclaimer b{color:var(--ink-2)}

@media(max-width:640px){
  .g-head, .g-body{padding-left:18px; padding-right:18px}
  .bet-meta .m{padding-left:0; padding-top:16px}
  .bet-meta .m .lbl{top:0}
}
</style>
</head>
<body>

  <div class="eyebrow" id="hero-eyebrow">World Cup 2026</div>

<script>
/* DATA is injected below. Schema (per RUNBOOK-morning.md step 5):

   the headline quote is a sportsbook. The PM tab shows only pm bets + all futures.
   Concluded games are OMITTED entirely (not rendered as reference). */
const DATA = {"meta": {"eyebrow": "World Cup 2026 · Round of 16 — plus Wimbledon R4", "heroSub": "Monday, July 6 — the Iberian derby in a climate-controlled AT&T Stadium, then USA–Belgium in front of a sold-out Lumen Field. Wimbledon's Monday card is priced tight and we pass it honestly. The card leans on one defensive fact (Spain haven't conceded all tournament) and one piece of Friday-night news the scorer board hasn't digested (Balogun's reinstatement).", "chips": ["2 WC Round-of-16 ties", "3 Wimbledon R4 matches", "Odds pulled 10:40–11:10 AM ET", "Model: market-anchored + fresh research (PELE snapshot 5 days stale — flagged)", "Kalshi combos offline (key not materialized)"], "disclaimer": "For entertainment. Edges are our independent projection vs. the de-vigged price — most of this slate is fairly priced and we say so. Lineups are PROJECTED until ~75 min pre-kick; re-confirm before staking. Live prices move by the minute — reprice before you bet. 21+, legal books only, only what you can afford to lose."}, "reportCard": {"record": "Yesterday 2-8", "roi": "−1.28u (−38.1%)", "note": "Worst prediction-market night yet (Kalshi 0-3): five goals at the Azteca killed the under/draw pair and Osaka beat the 71% number. Both winners were player-reads again — Haaland O3.5 shots (+105, dog-chaser volume, family now 4-2 lifetime with all four wins on the chasing side) and Quiñones anytime (+320). New house rule applied today: efficient binaries need a ≥4–5 pt model-market gap or we pass."}, "games": [{"sport": "Wimbledon", "matchup": "Madison Keys vs Linda Noskova", "venue": "Wimbledon · Women's R16", "ko": "Mon Jul 6 · 11:00 AM ET", "status": "PRE", "lineups": "<p><b>Keys:</b> 10-match grass win streak — Eastbourne title without dropping a set, then beat 2025 finalist Anisimova in R3. One R1 scare (three sets vs Kayla Day). 2025 AO champ; retired at this exact Wimbledon stage in 2024 (hamstring) — historical, no current flags. <b>Noskova:</b> Berlin champion (beat Pegula in the final — the scalp Keys couldn't take in Berlin), but two straight three-setters here and a match point saved vs Cîrstea in R3. First career meeting.</p>", "script": "<p>Power against power with both winning 76%+ of service games this fortnight, and the surface metrics say this is closer than the name-value price: Tennis Abstract grass Elo has them dead even (1842.6 vs 1844.4). We give Keys back a few points for the experience gap (12 slam QFs vs 1) and Noskova's wobblier week, landing at <b>Keys 54.5%</b> — right on DK's 55.1 and below Kalshi's 57.9. The only number that tempts is Noskova YES at ~42.5c on Kalshi (+3.4 pts vs our 45.5) — but that's under the new ≥4–5 pt bar on efficient binaries, and yesterday's 0-3 Kalshi night is exactly why the bar exists. <b>Pass.</b> Shape if you shop lines: over 22.5 games fits the two-big-serve profile, but the juice already knows it.</p>", "bets": []}, {"sport": "Wimbledon", "matchup": "Taylor Fritz vs Alexander Bublik", "venue": "Wimbledon · Men's R16", "ko": "Mon Jul 6 · ~12:30 PM ET", "status": "PRE", "lineups": "<p><b>Fritz:</b> two grass finals this season (Stuttgart, Halle), ten sets played here, zero five-setters, 100% tiebreak record this event. Beat Bublik 6-4 6-4 in 68 minutes in the Stuttgart SF three weeks ago. <b>Bublik:</b> two five-setters totaling ~8 hours already (4h vs Kokkinakis R1, 4h+ vs Tiafoe R3), 30 aces/match but only 52% second-serve points won — the exact leak an elite returner like Fritz attacks. No injury flags either side.</p>", "script": "<p>The fatigue asymmetry (8 hours of five-set tennis in Bublik's legs vs a clean Fritz path) plus a 2-0 recent grass H2H is real — but the market already charges for it: we make Fritz ~68% vs Kalshi's 66.5 fair, a 1.5–2 pt gap that doesn't clear the bar on a sharp ML. <b>Pass.</b> The thesis expresses better as Fritz −1.5 sets (Bublik's ace-driven holds keep early sets close; the break-down risk arrives late) — DK's API didn't return a set-handicap price this morning, so we flag the shape without a number rather than invent one.</p>", "bets": []}, {"sport": "Wimbledon", "matchup": "Alexander Zverev vs Jiri Lehecka", "venue": "Wimbledon · Men's R16", "ko": "Mon Jul 6 · ~1:00 PM ET", "status": "PRE", "lineups": "<p><b>Zverev:</b> reigning French Open champion, 41-10 on the season, one set dropped in ten here, 17 aces vs Giron — but he has never passed the Wimbledon R16 in his career, and he's played five tiebreaks in three matches (coin-flip exposure). <b>Lehecka:</b> dropped one set all event, held 2 match points on eventual champion Shelton in the Stuttgart SF, flat first-strike game that travels on grass — but 11-25 career vs the top 10. H2H 1-1, never on grass, nothing since 2023. No flags.</p>", "script": "<p>Our number lands <b>Zverev 70.5%</b> vs the market's 72.8 — a two-point Lehecka lean built from grass-Elo blend and Zverev's tiebreak-heavy scorelines, inside the noise band on an efficient binary. <b>Pass.</b> The right-shaped market is the total (both hold at elite rates; Zverev has played a tiebreak in all three matches): over 40.5 games at −125 is the lean, but the juice already reflects the profile and it's not Kalshi-executable. Nothing here beats the price.</p>", "bets": []}, {"sport": "World Cup", "matchup": "Portugal vs Spain", "venue": "AT&T Stadium, Arlington TX (roof closed, climate-controlled) · Round of 16", "ko": "Mon Jul 6 · 3:00 PM ET", "status": "PRE", "lineups": "<p><b>PROJECTED XIs (lock ~1:45 PM ET — re-confirm before staking).</b> <b>Portugal:</b> Diogo Costa; Cancelo, Rúben Dias, Renato Veiga, Nuno Mendes; João Neves, Vitinha; Neto/Conceição, Bruno Fernandes, Leão; <b>Ronaldo (starts — all sources agree</b> despite the visibly unhappy 81' hook vs Croatia). Fully fit squad per Martínez (Jul 5 presser). Rúben Dias is the only player on a yellow. <b>Spain:</b> Unai Simón; Porro, Cubarsí, Laporte, Cucurella; Rodri, Pedri, Olmo; Yamal, Oyarzabal, Baena — unchanged from the Austria 3-0. <b>Nico Williams (adductor) bench-only, Pino (shoulder) out</b>; Rodri no doubts. Spain carry zero bookings. Set pieces: POR — Bruno Fernandes (7 corners/FKs) + Nuno Mendes; pens Ronaldo then Bruno. ESP — Baena (14, primary), Yamal, Pedri; pens Oyarzabal. Roof closed — weather irrelevant; semi-neutral crowd in a ~92k sellout.</p>", "script": "<p>The market makes Spain 50.8% in 90 (Kalshi fair; DK 49.8 — identical), and our researched number lands 48–50 with Opta at 48.6: the headline lines are priced right and we don't fight them (Opta actually leans Portugal at 25.6% vs the market's 22.6 — a +3 gap that stays under our bar). What the market may be under-charging is the shape of Spain's dominance: four clean sheets to open the tournament — a first in their history — at 0.2 xGA per game, and Austria held to zero shots on target while Spain took 23. The primary script is Spain monopolizing the ball through Rodri–Pedri–Olmo, isolating Yamal (12 dribbles/90, the best WC rate since Okocha '98) on Nuno Mendes, scoring between the 30th and 70th minute, and managing the game. But our verification pass caught the draft overselling the other half: Portugal put up <b>15 shots and 2.2 xG</b> on Croatia (FotMob) and Opta has their attack at 1.6 xG/game — their best since 2014 — with a fully fit squad. Corrected, our BTTS-No number is ~43–46%, not 47–50: that kills DK's +120 (needs 45.45%) and leaves only Kalshi's no-vig 41c worth a reduced-size play. The Yes price still leans on this fixture's romantic history (3-3 in 2018, 2-2 in the 2025 Nations League final) while Spain's defense is a different animal — but the edge is a lean, not a hammer, and we size it that way.</p><p>Two disciplined notes. First: Ronaldo's shots ladder is a trap — his 3.75/game average is carried by the Uzbekistan rout (7); he took 3 and 2 against the real opponents, and he's a live 75' withdrawal. But don't route the fade into a Bruno Fernandes over either: verification killed that leg — when Portugal actually chased Croatia, Martínez's answer was a 61st-minute <b>quadruple substitution that took Bruno OFF</b>, and the chase ran through Conceição, Ramos and Bernardo. Portugal's chase script is a bench script; no shots-family play exists here, and the template stays holstered for USA–Belgium. Second: Yamal O3.5 shots at −115 is roughly fair (6 and 6 in his last two starts) but it's a favorite-star over, the exact family that went 0-2 on Jul 5 — pass at the juice.</p>", "altFutures": ["<b>If Portugal score first</b> (set piece or a Yamal-side transition): the BTTS-No spine dies early, Spain's live price barely moves — Spain live ML and Yamal/Oyarzabal shots overs become the value as Spain chase with the tournament's biggest volume attack.", "<b>If it's 0-0 at 70'</b>: remember the clock — the 90-min draw (26.6c) is what's cashing, and only to-advance pays through ET/pens. Portugal converted 5/5 in the 2025 Nations League final shootout vs this exact opponent; their advance price (~34%) carries real shootout equity the 90-min lines don't.", "<b>If Rúben Dias is booked</b> (he's the only player on a yellow): he misses a potential QF — irrelevant to today's settlement, but expect Portugal to manage him after 60' if the tie is stretched."], "bets": [{"kind": "single", "tier": "value", "label": "Both Teams To Score — NO (regulation) — Kalshi only", "price": "41c NO", "book": "Kalshi", "pm": true, "pmNote": "NO 41c<small>KXWCBTTS-26JUL06PORESP · DK's +120 was killed in verification (needs 45.45%)</small>", "mustBeTrue": "At least one side is blanked in 90 — most plausibly Portugal against the only defense with four straight World Cup clean sheets (0.2 xGA/game).", "edge": "corrected model 43–46% vs Kalshi 41c (+2 to +5 pts) — reduced size after verification found Portugal's attack (15 shots/2.2 xG vs Croatia) healthier than the draft assumed."}, {"kind": "sgp", "tier": "value", "label": "SGP: Spain ML (regulation) + BTTS No", "price": "+280 floor", "book": "DraftKings SGP — HARD floor +280; pass below", "pm": false, "legs": ["Spain to win in 90 (−110 standalone)", "Both Teams To Score — No (+120 standalone)"], "correlation": "Positively correlated: the modal Spain win IS the win-to-nil (all four wins this tournament came with clean sheets; a fifth today would be a WC-history first six straight) — DK prices the legs near-independently.", "mustBeTrue": "DK quotes ≥ +280 (naive product ~+320) and the primary script holds: Spain control, Portugal blanked. Half stake — verification halved the cushion.", "edge": "joint model ~27–29% vs 26.3% breakeven at the floor — thin but the mechanism (Spain's elite, unchanged defense) is nameable."}, {"kind": "longshot", "tier": "flyer", "label": "Rúben Dias anytime scorer", "price": "+2200", "book": "DraftKings", "pm": false, "mustBeTrue": "Dias starts (near-lock) and Portugal earn set-piece volume — verification confirmed they load the box with Ronaldo/Dias/Veiga at dead balls (that congestion produced the Croatia penalty), though Bruno's ~60' hook pattern trims the delivery window.", "edge": "model ~5.5% vs 4.3% implied. The Enciso/Diop rule: mechanism-backed aerial CBs at 20/1+ stay alive on a 0.1u stake."}]}, {"sport": "World Cup", "matchup": "USA vs Belgium", "venue": "Lumen Field, Seattle (open air; USA 7-0 here since 2025) · Round of 16", "ko": "Mon Jul 6 · 8:00 PM ET", "status": "PRE", "lineups": "<p><b>PROJECTED XIs (lock ~6:30 PM ET — re-confirm before staking).</b> <b>USA:</b> Freese; Freeman, Richards, Ream, Robinson; Adams, Tillman; Dest, McKennie, Pulisic; <b>Balogun</b>. The striker question resolved late: FIFA <b>suspended Balogun's red-card ban on Jul 5</b> (12-month probation) — every pre-Saturday preview had him out, and DK's board still prices Pepi (+190) and Wright (+210) like live starters. Pulisic fully recovered; McKenzie (foot) and Roldán (muscle) doubtful, neither projected. <b>Belgium:</b> Courtois; Castagne, Mechele, Theate, De Cuyper; Vanaken, Tielemans; Trossard, De Bruyne, D st-priced play of the night — with one caveat verification surfaced: Belgium was granted a FIFA appeal with a ruling possible by game time; if it lands, Balogun sits and scorer bets VOID (stake returned), so the appeal taxes the drama, not the price. On the fade side, De Bruyne O2.5 shots (−115, 53.5% implied) prices 2018-vintage KDB: he's the corner taker (corners aren't shots), the creator not the shooter, and the man <i>removed</i> — not featured — in every chasing script this tournament. No unders are posted, so it's an avoid, not a bet; Belgium's real chase volume migrates to Lukaku and Doku.</p>", "altFutures": ["<b>If Belgium score first</b> (the Türkiye script — transition through Doku): USA chase through Pulisic/Balogun with the crowd behind them; USA live-to-advance lengthens past 45c and becomes the value given the bench gap (Wright/Pepi/Reyna vs Belgium's thin non-Lukaku options).", "<b>If Lukaku is in the STARTING XI</b> (team sheet ~6:30 PM ET): our conditional Lukaku shots play fires (see board), and Belgium's BTTS/team-total overs firm up.", "<b>If it reaches extra time</b>: Belgium's core logged 125 minutes here five days ago and is the oldest at the tournament — USA's depth edge compounds; USA to-advance is the only market that pays for it."], "bets": [{"kind": "single", "tier": "best", "label": "Folarin Balogun anytime scorer", "price": "+170", "book": "DraftKings", "pm": true, "pmNote": "1+ @ 40c<small>KXWCGOAL-26JUL06USABEL — DK's +170 is the better price</small>", "mustBeTrue": "Balogun starts (projected everywhere post-reinstatement). NOTE: Belgium was granted a FIFA appeal, ruling possible by game time — if the ban is reinstated he doesn't play and the bet VOIDS (stake back), so the appeal is void-risk, not loss-risk.", "edge": "model ~41% vs DK 37% implied WITH vig (Kalshi's no-vig board says 39.5%) — the +170 still carries Friday's suspension uncertainty; FIFA lifted the ban Saturday."}, {"kind": "sgp", "tier": "value", "label": "SGP: USA ML (regulation) + Balogun anytime scorer", "price": "+450 floor", "book": "DraftKings SGP — HARD floor +450; pass below", "pm": false, "legs": ["USA to win in 90 (+145 standalone)", "Balogun anytime (+170 standalone)"], "correlation": "Redundant-positive: the modal USA win runs through their striker scoring — the quote must beat the conditional (~50% Balogun scores GIVEN a USA win), not the naive product (+562).", "mustBeTrue": "DK quotes ≥ +450 and Balogun starts (a successful Belgian appeal voids the scorer leg — check status before staking).", "edge": "joint model ~20% vs 18.2% breakeven at the floor."}, {"kind": "single", "tier": "value", "label": "CONDITIONAL: Romelu Lukaku Over 2.5 shots — ONLY if he STARTS", "price": "+110", "book": "DraftKings", "pm": false, "mustBeTrue": "Lukaku is in Belgium's confirmed XI (~6:30 PM ET team sheet). As a sub: NO BET at any price — the line is priced for ~60 minutes and roughly fair.", "edge": "if he starts: model ~55% vs 47.6% implied — a 90-minute Lukaku against a USA back line that donated 2.71 xG to the last quality attack it faced, in the dog-chaser volume family."}, {"kind": "longshot", "tier": "flyer", "label": "Malik Tillman anytime scorer", "price": "+475", "book": "DraftKings", "pm": false, "mustBeTrue": "Tillman starts (projected — though in the double pivot, a deeper station than a scorer bettor would like) and USA earn dead-ball volume: he keeps corner/FK duties (10 this WC) and scored a direct free kick against Bosnia five days ago.", "edge": "model ~21% vs 17.4% implied. Set-piece-taker mechanism — the family we're told not to over-kill."}]}], "futures": [{"sport": "World Cup", "label": "Argentina to win the World Cup — YES (OPEN position, opened Jul 5 @ 17c)", "ticker": "KXMENWORLDCUP-26 · ARG", "price": "17.3c fair (mid 17.5c) — holding, limit ≤18c", "tier": "strong", "mustBeTrue": "Argentina beat Egypt tomorrow (market: 84.5% to reach QF) and the final-round conversion gap holds: the board still prices France (33.9c) at ~2× Argentina (17.3c) while PELE had them near co-favorites.", "edge": "conditioned PELE 24.9–26.5% vs 17.3% de-vig (gap intact; PELE snapshot now 5 days stale — no adverse news found, but we are NOT adding)", "horizon": "Final, Jul 19"}, {"sport": "World Cup", "label": "No new futures today", "ticker": "—", "price": "—", "tier": "value", "mustBeTrue": "Discipline: the PELE path-to-title table predates the entire R16 (Jul 1 snapshot), so every ladder reprice would be model-free; Wimbledon advance ladders quoted 20–70c wide (e.g. Keys SEMI 16c bid / 93c ask) — untradeable.", "edge": "no fresh-model gap ≥5 pts that survives the staleness check", "horizon": "—"}]};

const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const app=document.getElementById('app');

document.getElementById('hero-eyebrow').textContent = DATA.meta.eyebrow || 'World Cup 2026';
document.getElementById('hero-sub').textContent = DATA.meta.heroSub || '';
const stamp=document.getElementById('hero-stamp');
(DATA.meta.chips||[]).forEach(c=>stamp.appendChild(el('span','chip',c)));
document.getElementById('disclaimer').innerHTML = DATA.meta.disclaimer || '';

if(DATA.reportCard){
  const rc=el('div','rc');
  rc.appendChild(el('span','t','Yesterday'));
  rc.appendChild(el('span','rec',DATA.reportCard.record||''));
  if(DATA.reportCard.roi) rc.appendChild(el('span','rec mono',DATA.reportCard.roi));
  if(DATA.reportCard.note) rc.appendChild(el('div','note',DATA.reportCard.note));
  document.getElementById('rc-slot').appendChild(rc);
}

const TIER_ORDER={best:0,strong:1,value:2,flyer:3};
const TIER_LABEL={best:'Best Bet',strong:'Strong',value:'Value',flyer:'Flyer'};

function renderBet(x, pmMode){
  const card=el('div','bet'+(x.tier==='best'?' best':''));
  const top=el('div','bet-top');
  const nm=el('div','name');
  nm.appendChild(el('span','flag '+x.tier,TIER_LABEL[x.tier]||x.tier));
  nm.appendChild(document.createTextNode(x.label));
  top.appendChild(nm);
  const priceTxt = (pmMode && x.pmNote) ? x.pmNote : (x.price+(x.book?'<small>'+x.book+'</small>':''));
  top.appendChild(el('div','price',priceTxt));
  card.appendChild(top);
  if(x.legs && x.legs.length){
    const ul=el('ul','legs'); x.legs.forEach(l=>ul.appendChild(el('li',null,l))); card.appendChild(ul);
  }
  const meta=el('div','bet-meta');
  const addM=(cls,lbl,txt)=>{const m=el('div','m '+cls); m.appendChild(el('span','lbl',lbl)); m.appendChild(document.createTextNode(' '+txt)); meta.appendChild(m);};
  if(x.correlation) addM('','Correlation',x.correlation);
  if(x.mustBeTrue) addM('','Needs',x.mustBeTrue);
  if(x.edge) addM('edge','Edge',x.edge);
  if(!pmMode && x.pm && x.pmNote) addM('','Kalshi',x.pmNote.replace(/<[^>]*>/g,''));
  if(x.horizon) addM('','Settles',x.horizon);
  card.appendChild(meta);
  return card;
}

function render(pmMode){
  app.innerHTML='';
  if(pmMode) app.appendChild(el('p','pm-note','Prediction-market mode: only Kalshi-executable plays (legal in GA/CA — no sportsbook required). Analysis unchanged.'));
  const gw=el('div','games');
  (DATA.games||[]).forEach((g,gi)=>{
    const c=el('article','game'); c.style.animationDelay=(gi*.09)+'s';
    const head=el('div','g-head');
    const when=el('div','when', g.ko+' &middot; '+g.venue);
    if(g.sport) when.appendChild(el('span','sport-tag',g.sport));
    if(g.status==='LIVE'){
      const lb=el('span','badge-live'); lb.appendChild(el('span','dot')); lb.appendChild(document.createTextNode('LIVE'));
      when.appendChild(lb);
    }
    head.appendChild(when);
    head.appendChild(el('h2',null,g.matchup.replace(/\s+(vs\.?|v|—|-)\s+/i,' <span class="at">v</span> ')));
    if(g.status==='LIVE' && g.liveState) head.appendChild(el('div','livestate',g.liveState));
    c.appendChild(head);

    const bd=el('div','g-body');
    const blk=(cls,k,vHtml)=>{const b=el('div','blk '+cls); b.appendChild(el('div','k',k)); b.appendChild(el('div','v',vHtml)); bd.appendChild(b); return b;};

    if(g.lineups) blk('','Lineups &amp; News', g.lineups);
    if(g.script)  blk('script','The Script', g.script);
    if(g.altFutures){
      const b=el('div','blk alt'); b.appendChild(el('div','k','Alternative Futures'));
      const v=el('div','v');
      (Array.isArray(g.altFutures)?g.altFutures:[g.altFutures]).forEach(a=>v.appendChild(el('div','alt-branch',a)));
      b.appendChild(v); bd.appendChild(b);
    }

    const bets = (g.bets||[]).filter(x=>!pmMode || x.pm);
    const b=el('div','blk board');
    b.appendChild(el('div','k','The Board — '+bets.length+' play'+(bets.length===1?'':'s')));
    if(bets.length){
      const list=el('div','bets');
      [...bets].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>list.appendChild(renderBet(x,pmMode)));
      b.appendChild(list);
    } else {
      b.appendChild(el('div','nopm', pmMode?'No Kalshi-executable edge in this match — analysis above still stands.':'No plays passed the edge bar.'));
    }
    bd.appendChild(b);
    c.appendChild(bd); gw.appendChild(c);
  });
  app.appendChild(gw);

  if(DATA.futures && DATA.futures.length){
    const f=el('section','futures');
    const fh=el('div','f-head');
    fh.appendChild(el('h2',null,'Futures Board'));
    fh.appendChild(el('div','sub','Tournament-level positions on Kalshi — tracked nightly in the ledger until they settle.'));
    f.appendChild(fh);
    const fb=el('div','f-body');
    const list=el('div','bets');
    [...DATA.futures].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>{
      const card=renderBet({...x, book:x.ticker, pm:true}, false);
      list.appendChild(card);
    });
    fb.appendChild(list); f.appendChild(fb); app.appendChild(f);
  }
}

// tabs
const tabs=el('div','tabs');
const tAll=el('button','tab on','All books');
const tPM=el('button','tab','Prediction markets');
tAll.onclick=()=>{tAll.classList.add('on');tPM.classList.remove('on');render(false);};
tPM.onclick=()=>{tPM.classList.add('on');tAll.classList.remove('on');render(true);};
tabs.appendChild(tAll); tabs.appendChild(tPM);
document.getElementById('rc-slot').appendChild(tabs);
render(false);
</script>
