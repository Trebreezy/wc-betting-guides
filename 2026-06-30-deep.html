a{color:var(--ice);text-decoration:none}
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#091022 0%,#070b16 100%);}
.hero::before{content:"";position:absolute;inset:0;opacity:.5;background-image:repeating-linear-gradient(90deg,transparent 0 78px,rgba(255,255,255,.025) 78px 79px);pointer-events:none;}

.eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--pitch);background:rgba(25,214,107,.08);border:1px solid rgba(25,214,107,.25);padding:6px 13px;border-radius:999px}

.hero h1{font-size:clamp(34px,6vw,58px);font-weight:700;margin:18px 0 8px}
.hero h1 .accent{background:linear-gradient(90deg,var(--pitch),var(--ice));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{font-size:clamp(15px,2.2vw,18px);color:var(--ink-dim);max-width:730px}
.hero .stamp{margin-top:20px;display:flex;flex-wrap:wrap;gap:10px}
.chip{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-dim);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 13px}

section{padding:38px 0 8px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:20px}
.sec-head .num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--pitch);padding-top:4px}
.sec-head h2{font-size:clamp(21px,3.4vw,29px);font-weight:600}

.panel{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:24px 26px;box-shadow:var(--shadow)}
.panel p{margin:0 0 12px}.panel p:last-child{margin-bottom:0}
.lead{font-size:17px;color:var(--ink)}

.banner .pulse{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--gold);margin-top:6px;box-shadow:0 0 0 0 rgba(245,197,66,.6);animation:pulse 1.8s infinite}
.banner b{color:var(--ink)}

.rcgame{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px;border-left:4px solid var(--line)}

.rcgame h4{font-size:16px;margin-bottom:3px}
.rcgame .res{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-faint);margin-bottom:9px}
.rcrow{display:flex;gap:8px;align-items:baseline;padding:4px 0;font-size:13.5px;color:var(--ink-dim)}

.mtab td.g{font-weight:600;color:var(--ink)}.mtab .mono{font-size:13px;color:var(--ink-dim)}

.cod-main{background:radial-gradient(420px 200px at 90% 0%,rgba(245,197,66,.12),transparent 60%),var(--panel);border:1px solid rgba(245,197,66,.3);border-radius:var(--r);padding:24px 26px;box-shadow:var(--shadow)}
.cod-main .tag2{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.cod-main h3{font-size:20px;margin:8px 0 10px}
.cod-side{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px}
.cod-side .tag2{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet)}
.cod-side h3{font-size:17px;margin:8px 0 10px}
.board{display:grid;gap:12px}
.bet{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 18px;transition:border-color .2s,transform .2s}
.bet:hover{border-color:rgba(25,214,107,.4);transform:translateX(3px)}
.bet .rank{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--ink-faint);width:26px;text-align:center}
.bet .body .game{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;color:var(--ink-faint);text-transform:uppercase}
.bet .body .name{font-weight:600;font-size:15.5px;color:var(--ink);margin:1px 0 3px}
.bet .body .why{font-size:13px;color:var(--ink-dim)}
.bet .meta{text-align:right;min-width:118px}

.bet .probs{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-faint);margin-top:2px}

.atype{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:999px;white-space:nowrap}

.game-body{padding:8px 24px 22px}
.row{padding:15px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:none}

.row.read .k{color:var(--ice)}.row.inc .k{color:var(--gold)}.row.lineup .k{color:var(--violet)}
.row .v{font-size:14px;color:var(--ink-dim)}.row .v b{color:var(--ink)}
.mini-board{display:grid;gap:9px;margin-top:4px}
.mini{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 14px}
.mini .n{font-weight:600;font-size:14px;color:var(--ink)}
.mini .n .sub{display:block;font-weight:400;font-size:12.5px;color:var(--ink-dim);margin-top:2px}
.mini .r{text-align:right;white-space:nowrap}
.mini .r .p{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px;color:var(--pitch)}
.mini .r .pr{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-faint);margin-top:2px}
.model-line{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-dim);background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:11px 14px;overflow-x:auto;white-space:nowrap}
footer{margin-top:46px;border-top:1px solid var(--line);padding-top:24px}
.disclaimer{font-size:13px;color:var(--ink-faint);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}

@media(max-width:720px){.cod{grid-template-columns:1fr}.bet{grid-template-columns:auto 1fr}.bet .meta{grid-column:2;text-align:left;margin-top:6px}.mtab{font-size:12.5px}}
</style>
</head>
