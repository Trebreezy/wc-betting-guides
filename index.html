<html lang="en">
<head>

<title>World Cup MD3 — Sharp's Betting Guide · June 26, 2026</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#070b16; --bg2:#0b1120; --panel:#0f1729; --panel2:#131d33; --line:#1e2b47;
  --ink:#eaf0fb; --ink-dim:#9fb0cd; --ink-faint:#6b7c9c;
  --pitch:#19d66b; --pitch-deep:#0a9c4a; --amber:#ffb020; --gold:#f5c542;
  --ice:#41c5f0; --rose:#ff5c7a; --violet:#9b8cff;
  --over:#19d66b; --under:#41c5f0; --flip:#ffb020;
  --r:16px; --shadow:0 18px 48px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:
    radial-gradient(1200px 600px at 78% -8%, rgba(25,214,107,.10), transparent 60%),
    radial-gradient(1000px 560px at 8% 4%, rgba(65,197,240,.09), transparent 55%),
    var(--bg);
  color:var(--ink); font-family:'Sora',system-ui,sans-serif; line-height:1.6;
  -webkit-font-smoothing:antialiased; padding-bottom:64px;
}
.wrap{max-width:1080px; margin:0 auto; padding:0 22px}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif; line-height:1.12; margin:0; letter-spacing:-.01em}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--ice); text-decoration:none}

/* HERO */
.hero{position:relative; overflow:hidden; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#091022 0%, #070b16 100%);}
.hero::before{content:""; position:absolute; inset:0; opacity:.5;
  background-image:repeating-linear-gradient(90deg, transparent 0 78px, rgba(255,255,255,.025) 78px 79px);
  pointer-events:none;}
.hero::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px;
  background:linear-gradient(90deg,var(--pitch),var(--ice),var(--amber));}
.hero-inner{position:relative; padding:54px 0 40px}
.eyebrow{display:inline-flex; align-items:center; gap:9px; font-family:'JetBrains Mono',monospace;
  font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--pitch);
  background:rgba(25,214,107,.08); border:1px solid rgba(25,214,107,.25); padding:6px 13px; border-radius:999px}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--pitch);box-shadow:0 0 0 4px rgba(25,214,107,.18)}
.hero h1{font-size:clamp(34px,6vw,60px); font-weight:700; margin:18px 0 8px}
.hero h1 .accent{background:linear-gradient(90deg,var(--pitch),var(--ice)); -webkit-background-clip:text; background-clip:text; color:transparent}
.hero .sub{font-size:clamp(15px,2.2vw,19px); color:var(--ink-dim); max-width:680px}
.hero .stamp{margin-top:20px; display:flex; flex-wrap:wrap; gap:10px}
.chip{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-dim);
  background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:7px 13px}
.chip b{color:var(--ink)}

/* SECTIONS */
section{padding:40px 0 8px}
.sec-head{display:flex; align-items:baseline; gap:14px; margin-bottom:20px}
.sec-head .num{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--pitch); padding-top:4px}
.sec-head h2{font-size:clamp(22px,3.4vw,30px); font-weight:600}
.sec-head .rule{flex:1; height:1px; background:linear-gradient(90deg,var(--line),transparent); align-self:center}

/* NARRATIVE / PROSE PANELS */
.panel{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
  border-radius:var(--r); padding:24px 26px; box-shadow:var(--shadow)}
.panel p{margin:0 0 12px} .panel p:last-child{margin-bottom:0}
.lead{font-size:17px; color:var(--ink)}
.themes{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-top:18px}
.theme{background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--pitch);
  border-radius:12px; padding:15px 17px; font-size:14.5px; color:var(--ink-dim)}
.theme.under{border-left-color:var(--under)} .theme.flip{border-left-color:var(--flip)}

/* CARD OF DAY */
.cod{display:grid; grid-template-columns:1.1fr 1fr; gap:16px; margin-top:4px}
.cod-main{background:
    radial-gradient(420px 200px at 90% 0%, rgba(245,197,66,.12), transparent 60%), var(--panel);
  border:1px solid rgba(245,197,66,.3); border-radius:var(--r); padding:24px 26px; box-shadow:var(--shadow)}
.cod-main .tag{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold)}
.cod-main h3{font-size:21px; margin:8px 0 10px}
.cod-side{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:22px 24px}
.cod-side .tag{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--violet)}
.cod-side h3{font-size:18px; margin:8px 0 10px}

/* HIGHLIGHT BOARDS (best singles/longshots/sgps) */
.board{display:grid; gap:12px}
.bet{display:grid; grid-template-columns:auto 1fr auto; gap:16px; align-items:center;
  background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:15px 18px;
  transition:border-color .2s, transform .2s}
.bet:hover{border-color:rgba(25,214,107,.4); transform:translateX(3px)}
.bet .rank{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; color:var(--ink-faint); width:26px; text-align:center}
.bet .body .game{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.05em; color:var(--ink-faint); text-transform:uppercase}
.bet .body .name{font-weight:600; font-size:16px; color:var(--ink); margin:1px 0 3px}
.bet .body .why{font-size:13.5px; color:var(--ink-dim)}
.bet .meta{text-align:right; min-width:120px}
.bet .price{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; color:var(--pitch)}
.bet .probs{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint); margin-top:2px}
.badge{display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase; padding:3px 9px; border-radius:999px; margin-top:6px}
.badge.strong{background:rgba(25,214,107,.16); color:var(--pitch); border:1px solid rgba(25,214,107,.35)}
.badge.solid{background:rgba(65,197,240,.14); color:var(--ice); border:1px solid rgba(65,197,240,.32)}
.badge.lean{background:rgba(255,176,32,.14); color:var(--amber); border:1px solid rgba(255,176,32,.3)}
.badge.longshot{background:rgba(155,140,255,.14); color:var(--violet); border:1px solid rgba(155,140,255,.32)}

/* SGP cards */
.sgp{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px}
.sgp h4{font-size:16px; margin-bottom:4px}
.sgp .legs{list-style:none; padding:0; margin:12px 0}
.sgp .legs li{display:flex; gap:10px; align-items:flex-start; padding:7px 0; border-bottom:1px dashed var(--line); font-size:14.5px}
.sgp .legs li:last-child{border-bottom:none}
.sgp .legs li::before{content:"▸"; color:var(--pitch); font-size:13px; margin-top:2px}
.sgp .corr{font-size:13px; color:var(--ink-dim); background:var(--panel2); border-radius:9px; padding:10px 13px; margin-top:6px}
.sgp .corr b{color:var(--ice)}

/* GAME CARDS */
.games{display:grid; gap:22px}
.game{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
  border-radius:18px; overflow:hidden; box-shadow:var(--shadow);
  opacity:0; transform:translateY(16px); animation:rise .6s forwards}
@keyframes rise{to{opacity:1; transform:none}}
.game-top{display:flex; justify-content:space-between; align-items:flex-start; gap:14px;
  padding:20px 24px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.02), transparent)}
.game-top .matchup{font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700}
.game-top .vinfo{font-size:12.5px; color:var(--ink-faint); margin-top:4px; font-family:'JetBrains Mono',monospace}
.atype{font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  padding:6px 12px; border-radius:999px; white-space:nowrap}
.atype.over{background:rgba(25,214,107,.14); color:var(--pitch); border:1px solid rgba(25,214,107,.34)}
.atype.under{background:rgba(65,197,240,.13); color:var(--under); border:1px solid rgba(65,197,240,.32)}
.atype.flip{background:rgba(255,176,32,.13); color:var(--flip); border:1px solid rgba(255,176,32,.3)}
.atype.live{background:rgba(255,92,122,.16); color:var(--rose); border:1px solid rgba(255,92,122,.42)}
.game.islive{border-color:rgba(255,92,122,.28)}
.game.islive .game-top{background:linear-gradient(180deg, rgba(255,92,122,.06), transparent)}
.live-banner{display:flex; gap:12px; align-items:flex-start; margin-top:28px;
  background:linear-gradient(180deg, rgba(255,92,122,.1), rgba(255,92,122,.03));
  border:1px solid rgba(255,92,122,.32); border-radius:14px; padding:15px 18px; font-size:14.5px; color:var(--ink-dim)}
.live-banner .pulse{flex-shrink:0; width:10px; height:10px; border-radius:50%; background:var(--rose); margin-top:6px;
  box-shadow:0 0 0 0 rgba(255,92,122,.6); animation:pulse 1.8s infinite}
.live-banner b{color:var(--ink)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,92,122,.5)}70%{box-shadow:0 0 0 9px rgba(255,92,122,0)}100%{box-shadow:0 0 0 0 rgba(255,92,122,0)}}
.game-body{padding:8px 24px 22px}
.row{padding:16px 0; border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .k{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--pitch); margin-bottom:7px}
.row.read .k{color:var(--ice)} .row.gd .k{color:var(--gold)} .row.lineup .k{color:var(--violet)}
.row .v{font-size:14.5px; color:var(--ink-dim)}
.row .v b{color:var(--ink)}
.mini-board{display:grid; gap:9px; margin-top:4px}
.mini{display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center;
  background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:11px 14px}
.mini .n{font-weight:600; font-size:14.5px; color:var(--ink)}
.mini .n .sub{display:block; font-weight:400; font-size:13px; color:var(--ink-dim); margin-top:2px}
.mini .r{text-align:right; white-space:nowrap}
.mini .r .p{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; color:var(--pitch)}
.mini .r .pr{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint); margin-top:2px}
.ls-row .r .p{color:var(--violet)}
.model-line{font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--ink-dim); line-height:1.5;
  background:var(--bg2); border:1px solid var(--line); border-radius:9px; padding:11px 14px; white-space:normal; word-wrap:break-word}

footer{margin-top:48px; border-top:1px solid var(--line); padding-top:24px}
.disclaimer{font-size:13px; color:var(--ink-faint); background:var(--panel); border:1px solid var(--line);
  border-radius:12px; padding:16px 18px}
.disclaimer b{color:var(--ink-dim)}
@media(max-width:720px){ .cod{grid-template-columns:1fr} .bet{grid-template-columns:auto 1fr; } .bet .meta{grid-column:2; text-align:left; margin-top:6px} }
</style>
</head>

flip", "lineupNote": "PROJECTED, not confirmed (lineups lock ~6:45 PM ET, ~75 min pre-kick). USA 4-2-3-1: Freese; Freeman, Richards, Ream, Robinson; Adams, Tillman; Dest, McKennie, Pulisic; Balogun — Adams/Balogun/Richards return from group-stage rotation, Pulisic projected fit after calf management. Bosnia 4-4-2: Vasilj; Dedic/Malic, Katic, Muharemovic, Kolasinac; Bajraktarevic, Sunjic, Basic, Alajbegovic; Demirovic, Dzeko — no reported injuries/suspensions, full-strength XI expected. Re-confirm both XIs at lineup lock.", "incentive": "Literal win-or-go-home for both sides (Round of 32). No rest/fatigue/travel edge either way — USA last played Jun 25 (6 days rest), Bosnia last played Jun 26 (5-6 days rest), both standard knockout-round turnarounds.", "ourRead": "USA are the clearly better side (PELE rating gap ~197 with home field; three independent sources — PELE, Kalshi, Opta — all cluster USA's win probability 67-71% and advance 76-84%, no daylight there) and the full-strength attacking spine (Balogun, Adams, Richards) returns after a rotated, immaterial loss to Türkiye. Bosnia have never kept a World Cup clean sheet in six tries and specifically leak on shots inside the box — exactly where Balogun/Pulisic operate — so a USA goal or two arriving is the base case. But Bosnia aren't passive: they're the tallest squad at the tournament with 3 goals from corners this cycle, and their entire route to this World Cup (beating Italy in the playoffs) was built on grinding, physical, win-or-go-home resilience. Once a Kalshi de-vig artifact on the spread ladder was corrected, the market's own number agrees with PELE that a routine 2+ goal margin is roughly a coin flip (~47-48%), not the 60%+ blowout it briefly appeared to price — so there's no real fade to make there either. Primary script: USA controls the ball and creates the better chances; alternate script (~15-20%): Bosnia snatches a set-piece goal and grinds for penalties, their proven path to even reaching this tournament.", "model": "Blended 1X2: USA 71.1% / Draw 19.0% / BIH 9.8% — essentially identical to Kalshi's de-vigged 71.1/18.4/10.5 and Opta's supercomputer read (67.5/18.3/14.3); no edge on the moneyline or the 83-84% advance number either. USA -1.5 (win by 2+): a Kalshi de-vig bug briefly overstated the market's raw price at 60%+ by wrongly cross-normalizing a nested goal-margin ladder; corrected and re-pulled, the market's raw price is ~47-48%, matching PELE (47.6%) and a Dixon-Coles Poisson check (45.0%) almost exactly — no edge. Over 2.5 (blend 56.2% vs. market ~59.5%) and BTTS Yes (blend 46.2% vs. market ~49.5%) show soft, single-digit leans too small to call price-is-wrong.", "gdAngle": "None — knockout, no goal differential. The lever translates into the total/clean-sheet environment and the to-advance market, both of which are efficiently priced tonight (see The Goal-Differential Lever section).", "singles": [], "longshots": [{"bet": "Correct score 1-0 USA (Reg Time)", "price": "~12¢ ask (Kalshi, fair ~11.4%)", "mechanism": "PELE 13.8% vs. market 11.4% — the tightest expression of “USA controls but Bosnia's grind mechanism keeps it to one goal.”"}, {"bet": "Correct score 2-0 USA (Reg Time)", "price": "~13¢ ask (Kalshi, fair ~12.4%)", "mechanism": "PELE's modal scoreline (12.0%), inside the Poisson top-2 (14.1%); market price is a near-exact match — clean, model-matched longshot, not a mispricing."}], "sgp": null}, {"matchup": "Belgium vs Senegal", "venue": "Lumen Field, Seattle (neutral)", "ko": "4:00 PM ET — LIVE, 0-0 (7')", "archetype": "LIVE — kicked off before this guide published, reference only", "archClass": "live", "lineupNote": "CONFIRMED at kickoff. Belgium (4-2-3-1): Courtois; Castagne, Theate, Mechele, De Cuyper; Tielemans, Vanaken; Doku, De Bruyne, Trossard; De Ketelaere — Lukaku left out of the XI, De Ketelaere playing false-9. Senegal (4-3-3): Diaw; Diatta, Ciss, Niakhaté, Jakobs; Diarra, Idrissa Gueye, Pape Gueye; Ndiaye, Sarr, Mané — No. 1 keeper Édouard Mendy unavailable (knee injury vs. Norway); Mory Diaw starts in his place.", "incentive": "Win-or-go-home, Round of 32. Belgium topped Group G; Senegal advanced as a third-place qualifier.", "ourRead": "This game had already kicked off (4:00 PM ET) by the time today's research was being built, so it was never presented as a pre-match pick — included here as live context only. Pre-match, PELE and the market both read it as close to a coin flip: PELE 34.8% Belgium / 29.8% Draw / 35.3% Senegal (advance split an exact 50/50); Kalshi's de-vigged read leaned Belgium a touch more (49.75% Belgium reg-time win, advance 66.5% Belgium / 33.5% Senegal). Both squads lean veteran (De Bruyne/Courtois/Vanaken for Belgium, Koulibaly/Gueye/a farewell-tournament Mané for Senegal) with Belgium missing a true No. 9 (Lukaku benched) and Senegal set up as an organized low block — pre-match research flagged this as a cagey, error/set-piece-driven script, plausibly live deep into extra time and penalties given the tactical parity on both benches.", "model": "PELE 34.8% / 29.8% / 35.3%; Kalshi de-vigged 49.75% / 28.1% / 22.2%. Not bettable pre-match today — shown for context only.", "gdAngle": "None — knockout tie.", "singles": [], "longshots": [], "sgp": null}, {"matchup": "England vs DR Congo", "venue": "Mercedes-Benz Stadium, Atlanta (neutral)", "ko": "12:00 PM ET — FINAL, England 2-1 DR Congo", "archetype": "FINAL — reference only", "archClass": "live", "lineupNote": "Match complete — no lineup-lock relevance remaining.", "incentive": "Round of 32, win-or-go-home — England advance to the Round of 16.", "ourRead": "FINAL: England 2, DR Congo 1. Brian Cipenga struck early (7') to give Congo DR a shock lead; England needed a Harry Kane brace — a 75th-minute header and an 86th-minute finish — to complete the comeback and advance. Bellingham (19') and Sadiki (28') were both booked. This game had already kicked off before today's guide was built, so it was never presented as a pre-match pick — included here as the completed result only, sourced from the live ESPN scoreboard fetched this run.", "model": "Pre-match PELE had England 78.5% / Draw 16.7% / DR Congo 4.8% to win in regulation — the model favorite held after an early scare.", "gdAngle": "None — knockout tie, now moot.", "singles": [], "longshots": [], "sgp": null}]};

const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const app=document.getElementById('app');

// hero
document.getElementById('hero-eyebrow').textContent = DATA.meta.eyebrow || 'World Cup 2026';
document.getElementById('hero-sub').textContent = DATA.meta.heroSub;
const stamp=document.getElementById('hero-stamp');
DATA.meta.chips.forEach(c=>{const s=el('span','chip',c); stamp.appendChild(s);});
document.getElementById('disclaimer').innerHTML = DATA.meta.disclaimer;
if(DATA.meta.liveBanner){const lb=el('div','live-banner'); lb.appendChild(el('span','pulse')); lb.appendChild(el('div',null,DATA.meta.liveBanner)); app.appendChild(lb);}

function sectionHead(num,title){
  const h=el('div','sec-head');
  h.appendChild(el('span','num',num));
  h.appendChild(el('h2',null,title));
  h.appendChild(el('div','rule'));
  return h;
}

// 1. The Read
let s=el('section'); s.appendChild(sectionHead('01','The Slate Read'));
let p=el('div','panel'); p.appendChild(el('p','lead',DATA.narrative));
const th=el('div','themes');
DATA.themes.forEach(t=>th.appendChild(el('div','theme '+(t.cls||''),t.txt)));
p.appendChild(th); s.appendChild(p); app.appendChild(s);

// 2. Card of the day
s=el('section'); s.appendChild(sectionHead('02','Card of the Day'));
const cod=el('div','cod');
const m=el('div','cod-main'); m.appendChild(el('div','tag','★ Tightest Play'));
m.appendChild(el('h3',null,DATA.cardOfDay.title)); m.appendChild(el('p',null,DATA.cardOfDay.body));
cod.appendChild(m);
const sd=el('div','cod-side'); sd.appendChild(el('div','tag','⚡ Best Longshot'));
sd.appendChild(el('h3',null,DATA.cardOfDay.longshotTitle)); sd.appendChild(el('p',null,DATA.cardOfDay.longshotBody));
cod.appendChild(sd); s.appendChild(cod); app.appendChild(s);

// 3. Best singles
s=el('section'); s.appendChild(sectionHead('03','Top Singles — Our Number vs the Price'));
const b=el('div','board');
DATA.bestSingles.forEach((x,i)=>{
  const r=el('div','bet');
  r.appendChild(el('div','rank',(i+1)));
  const body=el('div','body');
  body.appendChild(el('div','game',x.game));
  body.appendChild(el('div','name',x.bet));
  body.appendChild(el('div','why',x.rationale));
  r.appendChild(body);
  const meta=el('div','meta');
  meta.appendChild(el('div','price',x.price));
  meta.appendChild(el('div','probs','mkt '+x.marketProb+' → our '+x.modelProb));
  meta.appendChild(el('div','badge '+x.confidence,x.confidence));
  r.appendChild(meta); b.appendChild(r);
});
s.appendChild(b); app.appendChild(s);

// 4. Longshots
s=el('section'); s.appendChild(sectionHead('04','Longshots With Legs'));
const lb=el('div','board');
DATA.bestLongshots.forEach((x,i)=>{
  const r=el('div','bet');
  r.appendChild(el('div','rank','✦'));
  const body=el('div','body');
  body.appendChild(el('div','game',x.game));
  body.appendChild(el('div','name',x.bet));
  body.appendChild(el('div','why',x.mechanism));
  r.appendChild(body);
  const meta=el('div','meta');
  meta.appendChild(el('div','price',x.price));
  meta.appendChild(el('div','badge longshot','longshot'));
  r.appendChild(meta); lb.appendChild(r);
});
s.appendChild(lb); app.appendChild(s);

// 5. SGPs
s=el('section'); s.appendChild(sectionHead('05','Correlated Same-Game Parlays'));
const sg=el('div','board');
DATA.bestSGPs.forEach(x=>{
  const c=el('div','sgp');
  c.appendChild(el('h4',null,x.game));
  c.appendChild(el('p',null,x.thesis));
  const ul=el('ul','legs'); x.legs.forEach(l=>ul.appendChild(el('li',null,l))); c.appendChild(ul);
  c.appendChild(el('div','corr','<b>Why it correlates:</b> '+x.correlation+(x.stakeNote?' · '+x.stakeNote:'')));
  sg.appendChild(c);
});
s.appendChild(sg); app.appendChild(s);

// 6. Goal differential special
s=el('section'); s.appendChild(sectionHead('06','The Goal-Differential Lever'));
p=el('div','panel'); p.innerHTML='<p class="lead">'+DATA.gdSpecial+'</p>'; s.appendChild(p); app.appendChild(s);

// 7. Start/sit watch
s=el('section'); s.appendChild(sectionHead('07','Start / Sit Watch — Check Before You Lock'));
p=el('div','panel'); p.innerHTML='<p>'+DATA.startSit+'</p>'; s.appendChild(p); app.appendChild(s);

// 8. Game-by-game
s=el('section'); s.appendChild(sectionHead('08','Game-by-Game Breakdown'));
const gw=el('div','games');
DATA.games.forEach((g,gi)=>{
  const c=el('div','game'+(g.archClass==='live'?' islive':'')); c.style.animationDelay=(gi*0.08)+'s';
  const top=el('div','game-top');
  const left=el('div'); left.appendChild(el('div','matchup',g.matchup));
  left.appendChild(el('div','vinfo',g.venue+'  ·  '+g.ko));
  top.appendChild(left);
  top.appendChild(el('div','atype '+g.archClass,g.archetype));
  c.appendChild(top);
  const bd=el('div','game-body');

  const addRow=(cls,k,v)=>{const r=el('div','row '+cls); r.appendChild(el('div','k',k)); r.appendChild(el('div','v',v)); bd.appendChild(r); return r;};
  addRow('lineup','Lineups & News',g.lineupNote);
  addRow('','What They’re Playing For',g.incentive);
  addRow('read','Our Read — The Script',g.ourRead);
  const mr=el('div','row read'); mr.appendChild(el('div','k','Model vs Market')); mr.appendChild(el('div','model-line',g.model)); bd.appendChild(mr);

  if(g.singles && g.singles.length){
    const r=el('div','row'); r.appendChild(el('div','k','Singles With Edge'));
    const mb=el('div','mini-board');
    g.singles.forEach(x=>{
      const mi=el('div','mini');
      const n=el('div','n',x.bet); n.appendChild(el('span','sub',x.rationale)); mi.appendChild(n);
      const rr=el('div','r'); rr.appendChild(el('div','p',x.price));
      rr.appendChild(el('div','pr',x.marketProb+' → '+x.modelProb));
      rr.appendChild(el('div','badge '+x.confidence,x.confidence)); mi.appendChild(rr);
      mb.appendChild(mi);
    });
    r.appendChild(mb); bd.appendChild(r);
  }
  if(g.longshots && g.longshots.length){
    const r=el('div','row'); r.appendChild(el('div','k','Longshots'));
    const mb=el('div','mini-board');
    g.longshots.forEach(x=>{
      const mi=el('div','mini ls-row');
      const n=el('div','n',x.bet); n.appendChild(el('span','sub',x.mechanism)); mi.appendChild(n);
      const rr=el('div','r'); rr.appendChild(el('div','p',x.price)); mi.appendChild(rr);
      mb.appendChild(mi);
    });
    r.appendChild(mb); bd.appendChild(r);
  }
  if(g.sgp){
    const r=el('div','row'); r.appendChild(el('div','k','Same-Game Parlay'));
    const sgp=el('div','sgp');
    sgp.appendChild(el('p',null,g.sgp.thesis));
    const ul=el('ul','legs'); g.sgp.legs.forEach(l=>ul.appendChild(el('li',null,l))); sgp.appendChild(ul);
    sgp.appendChild(el('div','corr','<b>Correlation:</b> '+g.sgp.correlation));
    r.appendChild(sgp); bd.appendChild(r);
  }
  addRow('gd','Goal-Differential Angle',g.gdAngle);

  c.appendChild(bd); gw.appendChild(c);
});
s.appendChild(gw); app.appendChild(s);
</script>
</body>
</html>
