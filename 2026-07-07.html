<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Edge Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ————— Sunlit editorial: warm paper, forest green, olive, tan, brick ————— */
:root{
  --paper:#f3ede0;        /* warm cream */
  --paper2:#ede5d3;       /* deeper cream */
  --card:#faf6ec;         /* card surface */
  --ink:#26221a;          /* warm near-black */
  --ink-2:#5c5546;        /* warm gray-brown */
  --ink-3:#8a8271;        /* faint */
  --green:#2f5233;        /* deep forest */
  --green-2:#48693f;      /* leaf */
  --olive:#75774a;
  --tan:#b39868;
  --tan-line:#d8cbaf;     /* hairline borders */
  --brick:#a6432e;        /* accent / best-bet */
  --brick-soft:#f0dcd4;
  --r:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; color:var(--ink);
  font-family:'Instrument Sans',system-ui,sans-serif;
  font-size:16px; line-height:1.65;
  background:
    radial-gradient(900px 480px at 85% -6%, rgba(72,105,63,.10), transparent 62%),
    radial-gradient(720px 420px at -8% 12%, rgba(179,152,104,.14), transparent 58%),
    var(--paper);
  padding-bottom:72px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px; margin:0 auto; padding:0 22px}
h1,h2,h3{font-family:'Fraunces',serif; line-height:1.1; margin:0; letter-spacing:-.01em}
.mono{font-family:'Spline Sans Mono',monospace}
a{color:var(--green); text-decoration:none}

/* ————— Masthead ————— */
.hero{border-bottom:2px solid var(--ink); padding:44px 0 26px; position:relative}
.hero .eyebrow{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.24em;
  text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:10px}
.hero .eyebrow::before{content:""; width:26px; height:2px; background:var(--brick)}
.hero h1{font-size:clamp(36px,6.4vw,58px); font-weight:600; margin:14px 0 8px}
.hero h1 em{font-style:italic; color:var(--green)}
.hero .sub{font-size:clamp(15px,2.1vw,18px); color:var(--ink-2); max-width:620px; margin:0}
.hero .stamp{margin-top:18px; display:flex; flex-wrap:wrap; gap:8px}
.chip{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-2);
  background:var(--card); border:1px solid var(--tan-line); border-radius:999px; padding:5px 12px}
.chip b{color:var(--ink)}

/* ————— Report card strip (optional) ————— */
.rc{display:flex; flex-wrap:wrap; gap:10px 22px; align-items:baseline; margin-top:26px;
  background:var(--card); border:1px solid var(--tan-line); border-left:4px solid var(--olive);
  border-radius:var(--r); padding:14px 18px}
.rc .t{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--olive)}
.rc .rec{font-family:'Fraunces',serif; font-size:20px; font-weight:600}
.rc .note{font-size:13.5px; color:var(--ink-2); flex-basis:100%}

/* ————— Mode tabs (All books vs Prediction markets only) ————— */
.tabs{display:flex; gap:8px; margin-top:26px}
.tab{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  border:1.5px solid var(--tan-line); background:var(--card); color:var(--ink-2);
  border-radius:999px; padding:8px 16px; cursor:pointer}
.tab.on{border-color:var(--green); background:var(--green); color:#fff}
.tab:focus-visible{outline:2px solid var(--brick); outline-offset:2px}
.pm-note{font-size:13px; color:var(--ink-3); margin-top:8px}
.sport-tag{font-family:'Spline Sans Mono',monospace; font-size:10.5px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--olive); border:1px solid var(--tan-line);
  border-radius:5px; padding:2px 8px}
.nopm{font-size:14px; color:var(--ink-3); font-style:italic; padding:6px 0}

/* ————— Match cards ————— */
.games{display:grid; gap:34px; margin-top:38px}
.game{background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35);
  opacity:0; transform:translateY(14px); animation:rise .55s ease forwards; overflow:hidden}
@keyframes rise{to{opacity:1; transform:none}}
.g-head{padding:24px 26px 18px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(179,152,104,.08), transparent)}
.g-head .when{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.g-head h2{font-size:clamp(24px,4vw,34px); font-weight:600; margin-top:6px}
.g-head h2 .at{color:var(--tan); font-style:italic; font-weight:400; padding:0 4px}
.badge-live{display:inline-flex; align-items:center; gap:7px; font-family:'Spline Sans Mono',monospace;
  font-size:10.5px; font-weight:600; letter-spacing:.1em; color:#fff; background:var(--brick);
  border-radius:999px; padding:4px 11px}
.badge-live .dot{width:7px;height:7px;border-radius:50%;background:#fff; animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.livestate{margin-top:10px; font-family:'Spline Sans Mono',monospace; font-size:13px; color:var(--brick);
  background:var(--brick-soft); border-radius:9px; padding:8px 12px; display:inline-block}

.g-body{padding:6px 26px 24px}
.blk{padding:18px 0; border-bottom:1px solid var(--tan-line)}
.blk:last-child{border-bottom:none}
.blk .k{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.2em;
  text-transform:uppercase; color:var(--green); margin-bottom:9px; display:flex; align-items:center; gap:9px}
.blk .k::after{content:""; flex:1; height:1px; background:var(--tan-line)}
.blk .v{font-size:15px; color:var(--ink-2)}
.blk .v b, .blk .v strong{color:var(--ink)}
.blk .v p{margin:0 0 10px} .blk .v p:last-child{margin-bottom:0}
.blk.script .v{font-size:15.5px}
.blk.alt .k{color:var(--olive)}
.alt-branch{background:var(--paper2); border-left:3px solid var(--olive); border-radius:0 10px 10px 0;
  padding:11px 15px; margin:9px 0; font-size:14.5px; color:var(--ink-2)}
.alt-branch b{color:var(--ink)}

/* ————— The board (bets) ————— */
.blk.board .k{color:var(--brick)}
.bets{display:grid; gap:12px; margin-top:2px}
.bet{border:1px solid var(--tan-line); border-radius:12px; padding:15px 17px; background:var(--paper)}
.bet.best{border-color:var(--brick); border-width:1.5px; background:linear-gradient(180deg, rgba(166,67,46,.05), transparent), var(--paper)}
.bet-top{display:flex; justify-content:space-between; gap:14px; align-items:baseline; flex-wrap:wrap}
.bet-top .name{font-family:'Fraunces',serif; font-size:18px; font-weight:600}
.bet-top .price{font-family:'Spline Sans Mono',monospace; font-weight:700; font-size:17px; color:var(--green); white-space:nowrap}
.bet-top .price small{font-weight:400; color:var(--ink-3); font-size:11.5px; margin-left:6px}
.flag{display:inline-block; font-family:'Spline Sans Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; border-radius:5px; padding:3px 8px; margin-right:9px; vertical-align:2px}
.flag.best{background:var(--brick); color:#fff}
.flag.strong{background:var(--green); color:#fff}
.flag.value{background:transparent; color:var(--olive); border:1.5px solid var(--olive)}
.flag.flyer{background:transparent; color:var(--tan); border:1.5px solid var(--tan)}
.legs{list-style:none; margin:10px 0 2px; padding:0}
.legs li{padding:5px 0 5px 20px; position:relative; font-size:14.5px; color:var(--ink-2); border-bottom:1px dashed var(--tan-line)}
.legs li:last-child{border-bottom:none}
.legs li::before{content:"+"; position:absolute; left:2px; color:var(--brick); font-weight:700}
.bet-meta{margin-top:10px; display:grid; gap:6px}
.bet-meta .m{font-size:13.5px; color:var(--ink-2); padding-left:86px; position:relative}
.bet-meta .m .lbl{position:absolute; left:0; top:1px; font-family:'Spline Sans Mono',monospace; font-size:10px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.bet-meta .m.edge .lbl{color:var(--green)}
.bet-meta .m.edge{font-family:'Spline Sans Mono',monospace; font-size:12.5px; color:var(--green-2)}

/* ————— Futures board ————— */
.futures{margin-top:34px; background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35); overflow:hidden}
.futures .f-head{padding:20px 26px 14px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(47,82,51,.06), transparent)}
.futures .f-head h2{font-size:clamp(20px,3.4vw,28px); font-weight:600}
.futures .f-head .sub{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-3); margin-top:4px}
.futures .f-body{padding:14px 26px 22px}
.f-horizon{font-family:'Spline Sans Mono',monospace; font-size:10.5px; color:var(--ink-3)}

/* ————— Footer ————— */
footer{margin-top:52px; border-top:2px solid var(--ink); padding-top:22px}
.disclaimer{font-size:13px; color:var(--ink-3); line-height:1.6}
.disclaimer b{color:var(--ink-2)}

@media(max-width:640px){
  .g-head, .g-body{padding-left:18px; padding-right:18px}
  .bet-meta .m{padding-left:0; padding-top:16px}
  .bet-meta .m .lbl{top:0}
}
</style>
</head>
<body>

  <div class="eyebrow" id="hero-eyebrow">World Cup 2026</div>

</div></header>

<script>
/* DATA is injected below. Schema (per RUNBOOK-morning.md step 5):
   meta{eyebrow, heroSub, chips[], disclaimer}

   the headline quote is a sportsbook. The PM tab shows only pm bets + all futures.
   Concluded games are OMITTED entirely (not rendered as reference). */
const DATA = {"meta": {"eyebrow": "World Cup 2026 · Round of 16 — plus Wimbledon quarterfinals", "heroSub": "Tuesday, July 7 — the last two R16 tickets: Messi's Argentina meet Salah's Egypt under the closed Atlanta roof, then Switzerland–Colombia closes out BC Place's World Cup. The card is built on one piece of Monday-night news the goals markets haven't fully digested (Manzambi out, Vargas doubtful — five of Switzerland's nine goals compromised) and one Wimbledon price that overweights a single result.", "chips": ["2 WC Round-of-16 ties", "4 Wimbledon QFs (2 priced, 2 passes)", "Odds pulled 10:40–11:10 AM ET", "Model: market-anchored + fresh research (PELE snapshot Jul 5 — pre-R32, flagged)", "Kalshi combos offline (key truncated in env)"], "disclaimer": "For entertainment. Edges are our independent projection vs. the de-vigged price — most of this slate is fairly priced and we say so. Lineups are PROJECTED until ~75 min pre-kick; re-confirm before staking. Live prices move by the minute — reprice before you bet. 21+, legal books only, only what you can afford to lose."}, "reportCard": {"record": "Yesterday 3-3 (+1 no-action)", "roi": "+0.41u (+30.0%)", "note": "First green night since Jul 1. The winners were the mechanism plays again — BTTS-No at 41c, the Spain ML + BTTS-No SGP at the +280 floor, and Tillman's direct free kick at +475 (the exact set-piece-taker read). Verification earned its keep twice: an arithmetic input fix resized two winners up, and the one fact-based kill (Bruno hooked at 62') graded as a would-be loss. Same discipline today."}, "games": [{"sport": "Wimbledon", "matchup": "Alexander Zverev vs Jiri Lehecka", "venue": "Wimbledon · Men's R16 — overnight resumption, Centre Court", "ko": "Tue Jul 7 · resumed ~10:50 AM ET", "status": "LIVE", "liveState": "Resumed at 6-4 7-5 3-3 (Zverev two sets up, set 3 on serve)", "lineups": "<p>Curfew suspension, not a physical one: no MTOs, no taping, no flags on either player — Lehecka's long bathroom break after set 2 pushed the third set past 10:30 PM. Before the stoppage Zverev's serve was near-untouchable (73% first serves in, 95% of first-serve points won).</p>", "script": "<p>Two-set cushions with zero injury overlay are priced brutally and correctly: Kalshi has Zverev 92.5, DK de-vigs to 92.3. Cold-restart wobble is real but already in the number, and Lehecka never had a look after game one of the third. Our number is the market's number. <b>Pass</b> — same verdict as yesterday, one set closer to over.</p>", "bets": []}, {"sport": "Wimbledon", "matchup": "Naomi Osaka vs Karolina Muchova", "venue": "Wimbledon · Women's QF — 2nd on No.1 Court (after Sinner–Struff), ~31°C fast grass", "ko": "Tue Jul 7 · ~11:15 AM ET", "status": "PRE", "lineups": "<p><b>Osaka:</b> zero sets dropped this fortnight, 65-minute R3, then the statement win — 6-2 7-6(2) over world No.1 Sabalenka on Sunday. First career Wimbledon QF. The one flag is 10 days old: she retired in the Bad Homburg final with a right-foot problem; no recurrence reported, but it's untested in a long three-setter. <b>Muchova:</b> 9-1 on grass in 2026, an eight-match grass win streak, and her first grass title at Bad Homburg — where she led Osaka 6-1, 1-0 before the retirement. First Wimbledon QF since 2021, no injury flags this fortnight (notable for the tour's most chronically flagged body). H2H 3-3 overall; grass 1-0 Muchova.</p>", "script": "<p>The market makes Osaka 56.5 — a price built substantially on one spectacular result against a player (Sabalenka) she'd lost to three times this year. Every surface-specific input points the other way: Tennis Abstract grass Elo has Muchova ahead 1852 to 1793, her 2026 grass record is better, and the only grass meeting — ten days ago — was 6-1 Muchova before Osaka's foot ended it. Osaka's serve on fast, 31° grass is a genuine equalizer and her fortnight has been cleaner; we're not claiming a Muchova favorite, just that 43.5 underprices her. Market-anchored with a +5 adjustment for the concordant grass signals: <b>Muchova ~48.5%</b> vs 44c on Kalshi — right at our bar, taken small because the mechanism is nameable (single-result anchoring) and every grass-specific input agrees.</p>", "bets": [{"kind": "single", "tier": "value", "label": "Karolina Muchova to win", "price": "44c<small>KXWTAMATCH-26JUL07OSAMUC</small>", "book": "Kalshi", "pm": true, "pmNote": "44c YES Muchova (KXWTAMATCH-26JUL07OSAMUC)", "mustBeTrue": "The grass-specific inputs (Elo edge, 8-match streak, the 6-1 set ten days ago) outweigh Osaka's Sabalenka statement — near a coin flip, bought at 44.", "edge": "model ~48.5% vs 44c ask (+4.5 pts) — clears the bar with a nameable mechanism: the market is anchoring on one hard-court-profile result. Verification confirmed the Elo numbers exactly and that Bad Homburg was a genuine rout (4-0, double break) before the retirement"}]}, {"sport": "World Cup", "matchup": "Argentina vs Egypt", "venue": "Mercedes-Benz Stadium, Atlanta · R16 — roof closed, climate-controlled", "ko": "Tue Jul 7 · 12:00 PM ET", "status": "PRE", "lineups": "<p><b>Argentina (CONFIRMED ~11:15 ET):</b> E. Martínez; Molina, Romero, L. Martínez, Tagliafico; De Paul, Paredes, Mac Allister, Almada; Messi (c), J. Álvarez. Messi and both centre-backs start; Lautaro benched for Álvarez. <b>Egypt (CONFIRMED):</b> Shobeir; Hany, Rabia, Y. Ibrahim, Hafez; Attia, Lasheen, Ashour; Hassan, Zizo, Salah (c). The back line is genuinely patched: first-choice CB Abdelmonem is out of the squad sheet entirely (ankle), both first-choice left-backs (Fatouh, El Fotouh) are ruled out, and Hafez starts despite a muscle-strain doubt. Salah starts but entered the Australia game with a hamstring concern and visibly didn't sprint at full speed across 120'. Marmoush on the BENCH (0 g/a in 316 minutes).</p>", "script": "<p>Argentina's group-stage steamroller (11 goals in 4 games, Messi 7 of them) meets Egypt's organized 4-2-3-1 mid-block in a quasi-home Atlanta crowd. Scaloni's stated plan is midfield control to starve Salah's supply — Egypt's entire creative output routes through him (16 chances created, joint tournament lead), and he's the one carrying a hamstring flag. Egypt have scored more than once in a game exactly once all tournament, and their R32 survival was a shootout after Australia's unforced misses. The primary script is patient Argentine control, an opener before the hour (Messi from a free role, or the corner routine — more on that below), and a mid-block that has to open up late, at which point Argentina's transition finishing decides whether this is 2-0 or 3-0. We make Argentina ~75% in 90 minutes vs the market's 72.9 — real but under our 4–5pt bar on efficient binaries, so the moneyline is a pass.</p><p>The mechanism the exotic boards may be lagging: <b>Argentina's dead-ball routine is hot and Egypt's aerial spine is broken.</b> Both extra-time goals against Cape Verde came from Messi set pieces attacking the centre-backs — Lisandro Martínez finished from a Messi corner (via a Mac Allister flick-on), and the 111' winner was an own goal forced under Romero's aerial challenge on another Messi delivery. Egypt's best aerial defender (Abdelmonem) isn't even on today's squad sheet, behind a reshuffled back four. Against a mid-block, corners accumulate. That's a nameable, fact-backed path to a defender goal at a deep price — the exact profile (set-piece mechanism, aerial CB) our grading history says the market underprices and we historically over-kill. Verification note: we initially over-credited the routine (\"two CB headers\") — the corrected film detail above is weaker in the letter but identical in mechanism, and both centre-backs start.</p><p>And the system's signature play is live after all: our first read had Salah as a low-volume creator, but verification falsified that input — he was at one point the tournament's shots-on-target leader alongside his 16 chances created. A talisman with real shot volume, on a side that will spend an hour-plus chasing, is exactly the dog-designated-shooter profile that's 4-2 lifetime for us with all four wins on the chasing side — and DraftKings prices his over at anti-correlated odds (+280 for 3+ shots) precisely because they price Egypt as smothered. The hamstring is the honest counter-argument; we size for it. The Kalshi board here is efficient everywhere we checked (reg ML, spread, totals, BTTS, correct scores all within ~2pts of our numbers) — the honest PM answer for this match is no play.</p>", "altFutures": ["If Egypt survive to 60' at 0-0: the draw (19.6 fair) and Egypt +1.5 come live in-play, and Argentina's corner count climbs — the L. Martínez/Romero scorer mechanism gets stronger, not weaker, in a siege script.", "If Salah's hamstring fails early or he's clearly a passenger: Egypt's advance price (14.5c) collapses and Argentina -1.5 (46.5) becomes the live-market attack."], "bets": [{"kind": "single", "tier": "value", "label": "Mohamed Salah over 2.5 shots", "price": "+280", "book": "DraftKings", "pm": false, "mustBeTrue": "Egypt trail for a long stretch (72.9% market chance Argentina win in 90) and the chase runs through Salah's feet — he needs 3+ total shots, any accuracy.", "edge": "model ~38-40% vs 26.3% implied (+12-14 pts) — priced as anti-correlated with an Argentina win; our template says the trailing talisman shoots MORE"}, {"kind": "longshot", "tier": "value", "label": "Lisandro Martínez anytime scorer (regulation)", "price": "+1900", "book": "DraftKings", "pm": false, "mustBeTrue": "One Messi set piece finds the CONFIRMED-starting CB against a backline missing its best aerial defender — he scored off this exact routine on Friday.", "edge": "model ~6.5% vs 5.0% implied — small in absolute terms, real in mechanism; Romero (+1000) is the same thesis at half the price, take Lisandro"}, {"kind": "sgp", "tier": "value", "label": "Argentina −1.5 (90 min) + Messi anytime scorer", "price": "floor +250", "book": "DraftKings SGP", "pm": false, "legs": ["Argentina -1.5 (regulation)", "Lionel Messi anytime goalscorer"], "correlation": "Strongly positive: Messi has 7 of Argentina's 11 goals and takes the pens/FKs — the blowout script almost always includes him on the sheet. Independent product prices ~+285; correlated fair is ~+215.", "mustBeTrue": "Argentina win by 2+ in 90 with Messi (CONFIRMED starting) scoring any goal.", "edge": "model ~32% joint vs 28.6% at the +250 floor — only bet if DK's bundled quote is +250 or better"}]}, {"sport": "Wimbledon", "matchup": "Novak Djokovic vs Felix Auger-Aliassime", "venue": "Wimbledon · Men's QF — Centre Court, third match on", "ko": "Tue Jul 7 · ~12:45 PM ET (floating, behind the Zverev resumption)", "status": "PRE", "lineups": "<p><b>Djokovic (39):</b> 11h16m on court through four rounds, three of them four-setters; broken 8 times but 9th straight Wimbledon QF and a 7-time champion. No MTOs; says the body is \"kind of okay.\" <b>Auger-Aliassime:</b> 67 aces, broken ONCE in four matches (82.9% first-serve points won) — but he's coming off a 4h26m five-setter Sunday with one rest day, and has never beaten Djokovic in a completed match on anything but indoor hard (H2H 1-1, never on grass).</p>", "script": "<p>This is two offsetting mispricings that cancel: the workload/age case for FAA (11 hours in the legs at 39, broken 8x vs 1x) argues the 60.5 on Djokovic is too high; the surface case for Djokovic (grass Elo gap of ~136 points, 7 titles, FAA's own 4h26 Sunday, and a floating late start that brings roof-and-lights conditions favoring the returner) argues it's too low. We land within two points of the market and have no nameable one-way mechanism. <b>Pass.</b> If the earlier matches run long and this starts under the roof, Djokovic's number should tick up live, not down.</p>", "bets": []}, {"sport": "World Cup", "matchup": "Switzerland vs Colombia", "venue": "BC Place, Vancouver · R16 — indoor, the venue's final WC match", "ko": "Tue Jul 7 · 4:00 PM ET", "status": " ts at 50.5 yes / ~49.5 no; our injury-adjusted board says no-BTTS is 57-60%. Cut Switzerland's expected goals from ~1.0 to ~0.8 for the missing five of nine goals' worth of production, against the stingiest defense left in the tournament (Opta: Colombia out-created Ghana 20 shots to 8, 2.19 xG to 0.26), and \"Colombia keep a clean sheet\" is the single most mispriced binary on today's slate — and it's Kalshi-executable. The same thesis compounds into the Colombia-to-nil SGP at a floor, the exact structure that cashed for us with Spain on Sunday. Edge survives the sensitivity check: even granting Switzerland a softer λ haircut (0.9), no-BTTS models at 56.6.</p>", "altFutures": ["If R. Vargas is confirmed OUT at lineup drop (~3:15 ET): Switzerland lose 5 of 9 tournament goals plus the corner delivery — add to the BTTS-No position at anything ≤52c and look at Colombia -0.5 live.", "If James is scratched: Colombia's set-piece and penalty hierarchy shifts to Díaz/Quintero; creation dips but the clean-sheet thesis (which lives on the Swiss side) is untouched.", "If Switzerland score first anyway: Colombia's 20-shot chase profile makes Díaz volume props the live-market pivot; the BTTS-No single is dead but the game flips to Colombia chase overs."], "bets": [{"kind": "single", "tier": "best", "label": "Both teams to score — NO (regulation)", "price": "50c<small>KXWCBTTS-26JUL07SUICOL · buy NO</small>", "book": "Kalshi", "pm": true, "pmNote": "50c NO (KXWCBTTS-26JUL07SUICOL)", "mustBeTrue": "Either side keeps a clean sheet in 90 — most likely Colombia's fourth straight, against a Swiss XI missing Manzambi (3 of their 9 goals) with Vargas/Sow doubtful.", "edge": "model 57-60% vs ~49.5-50% market (+7 to +10 pts) — clears the ≥4-5pt bar on efficient binaries with a nameable Monday-night mechanism"}, {"kind": "sgp", "tier": "strong", "label": "Colombia to win (90 min) + BTTS No", "price": "floor +280", "book": "DraftKings SGP", "pm": false, "legs": ["Colombia moneyline (regulation)", "Both teams to score — No"], "correlation": "Positive: Colombia's win condition IS the clean sheet (1 GA all tournament; wins by control, not shootouts). Independent product prices ~+376; correlated fair ~+230.", "mustBeTrue": "Colombia win in 90 without conceding — the Spain-on-Sunday structure transplanted onto a better-priced spot.", "edge": "model 29-31% joint vs 26.3% at the +280 floor — only bet at +280 or better"}, {"kind": "single", "tier": "flyer", "label": "PASSED at the wire: Breel Embolo over 2.5 shots (+165)", "price": "no bet", "book": "—", "pm": false, "mustBeTrue": "Nothing — we're not taking it. Logged for transparency: the dog-chaser template flagged Embolo, but verification pulled his actual shot log (4/1/2/2 — 2.25 per game, cleared 2.5 once in four) and our chase-adjusted number (~35%) lands BELOW the 37.7% implied. The template needs a genuine volume shooter; Embolo isn't one.", "edge": "model ~35% vs 37.7% implied — negative. A padded card is how the system loses; the pass IS the discipline"}]}], "futures": [{"sport": "World Cup", "label": "Argentina to win the World Cup — HOLDING (opened Jul 5 @ 17c)", "ticker": "KXMENWORLDCUP-26 · YES Argentina", "price": "18c<small>mark, +1c on entry</small>", "tier": "strong", "mustBeTrue": "Argentina convert the softest remaining path (Egypt today, SUI/COL in the QF) at the rate PELE says, not the rate the market says.", "edge": "PELE path 26.5% (pre-R32 snapshot) vs 17.7% de-vig — gap intact; no adverse news (Messi starts today). No re-add: position already open at 0.5u.", "horizon": "Settles Jul 19 (final)"}, {"sport": "World Cup", "label": "Argentina to reach the Final — MONITORED, not added", "ticker": "KXWCROUND-26FINAL · Argentina", "price": "37c<small>ask · PELE ~45 conditional</small>", "tier": "value", "mustBeTrue": "Same thesis as the winner position — we're already 0.5u long Argentina conversion and won't stack correlated futures off a PELE snapshot that predates the Cape Verde scare.", "edge": "+8 pts on paper, but the snapshot is pre-R32 and the market has watched Argentina nearly go to penalties since. Discipline: flagged, not bought.", "horizon": "Settles Jul 15-16 (semis)"}]};

const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const app=document.getElementById('app');

document.getElementById('hero-eyebrow').textContent = DATA.meta.eyebrow || 'World Cup 2026';
document.getElementById('hero-sub').textContent = DATA.meta.heroSub || '';
const stamp=document.getElementById('hero-stamp');
(DATA.meta.chips||[]).forEach(c=>stamp.appendChild(el('span','chip',c)));
document.getElementById('disclaimer').innerHTML = DATA.meta.disclaimer || '';

if(DATA.reportCard){
  const rc=el('div','rc');
  rc.appendChild(el('span','t','Yesterday'));
  rc.appendChild(el('span','rec',DATA.reportCard.record||''));
  if(DATA.reportCard.roi) rc.appendChild(el('span','rec mono',DATA.reportCard.roi));
  if(DATA.reportCard.note) rc.appendChild(el('div','note',DATA.reportCard.note));
  document.getElementById('rc-slot').appendChild(rc);
}

const TIER_ORDER={best:0,strong:1,value:2,flyer:3};
const TIER_LABEL={best:'Best Bet',strong:'Strong',value:'Value',flyer:'Flyer'};

function renderBet(x, pmMode){
  const card=el('div','bet'+(x.tier==='best'?' best':''));
  const top=el('div','bet-top');
  const nm=el('div','name');
  nm.appendChild(el('span','flag '+x.tier,TIER_LABEL[x.tier]||x.tier));
  nm.appendChild(document.createTextNode(x.label));
  top.appendChild(nm);
  const priceTxt = (pmMode && x.pmNote) ? x.pmNote : (x.price+(x.book?'<small>'+x.book+'</small>':''));
  top.appendChild(el('div','price',priceTxt));
  card.appendChild(top);
  if(x.legs && x.legs.length){
    const ul=el('ul','legs'); x.legs.forEach(l=>ul.appendChild(el('li',null,l))); card.appendChild(ul);
  }
  const meta=el('div','bet-meta');
  const addM=(cls,lbl,txt)=>{const m=el('div','m '+cls); m.appendChild(el('span','lbl',lbl)); m.appendChild(document.createTextNode(' '+txt)); meta.appendChild(m);};
  if(x.correlation) addM('','Correlation',x.correlation);
  if(x.mustBeTrue) addM('','Needs',x.mustBeTrue);
  if(x.edge) addM('edge','Edge',x.edge);
  if(!pmMode && x.pm && x.pmNote) addM('','Kalshi',x.pmNote.replace(/<[^>]*>/g,''));
  if(x.horizon) addM('','Settles',x.horizon);
  card.appendChild(meta);
  return card;
}

function render(pmMode){
  app.innerHTML='';
  if(pmMode) app.appendChild(el('p','pm-note','Prediction-market mode: only Kalshi-executable plays (legal in GA/CA — no sportsbook required). Analysis unchanged.'));
  const gw=el('div','games');
  (DATA.games||[]).forEach((g,gi)=>{
    const c=el('article','game'); c.style.animationDelay=(gi*.09)+'s';
    const head=el('div','g-head');
    const when=el('div','when', g.ko+' &middot; '+g.venue);
    if(g.sport) when.appendChild(el('span','sport-tag',g.sport));
    if(g.status==='LIVE'){
      const lb=el('span','badge-live'); lb.appendChild(el('span','dot')); lb.appendChild(document.createTextNode('LIVE'));
      when.appendChild(lb);
    }
    head.appendChild(when);
    head.appendChild(el('h2',null,g.matchup.replace(/\s+(vs\.?|v|—|-)\s+/i,' <span class="at">v</span> ')));
    if(g.status==='LIVE' && g.liveState) head.appendChild(el('div','livestate',g.liveState));
    c.appendChild(head);

    const bd=el('div','g-body');
    const blk=(cls,k,vHtml)=>{const b=el('div','blk '+cls); b.appendChild(el('div','k',k)); b.appendChild(el('div','v',vHtml)); bd.appendChild(b); return b;};

    if(g.lineups) blk('','Lineups &amp; News', g.lineups);
    if(g.script)  blk('script','The Script', g.script);
    if(g.altFutures){
      const b=el('div','blk alt'); b.appendChild(el('div','k','Alternative Futures'));
      const v=el('div','v');
      (Array.isArray(g.altFutures)?g.altFutures:[g.altFutures]).forEach(a=>v.appendChild(el('div','alt-branch',a)));
      b.appendChild(v); bd.appendChild(b);
    }

    const bets = (g.bets||[]).filter(x=>!pmMode || x.pm);
    const b=el('div','blk board');
    b.appendChild(el('div','k','The Board — '+bets.length+' play'+(bets.length===1?'':'s')));
    if(bets.length){
      const list=el('div','bets');
      [...bets].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>list.appendChild(renderBet(x,pmMode)));
      b.appendChild(list);
    } else {
      b.appendChild(el('div','nopm', pmMode?'No Kalshi-executable edge in this match — analysis above still stands.':'No plays passed the edge bar.'));
    }
    bd.appendChild(b);
    c.appendChild(bd); gw.appendChild(c);
  });
  app.appendChild(gw);

  if(DATA.futures && DATA.futures.length){
    const f=el('section','futures');
    const fh=el('div','f-head');
    fh.appendChild(el('h2',null,'Futures Board'));
    fh.appendChild(el('div','sub','Tournament-level positions on Kalshi — tracked nightly in the ledger until they settle.'));
    f.appendChild(fh);
    const fb=el('div','f-body');
    const list=el('div','bets');
    [...DATA.futures].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>{
      const card=renderBet({...x, book:x.ticker, pm:true}, false);
      list.appendChild(card);
    });
    fb.appendChild(list); f.appendChild(fb); app.appendChild(f);
  }
}

// tabs
const tabs=el('div','tabs');
const tAll=el('button','tab on','All books');
const tPM=el('button','tab','Prediction markets');
tAll.onclick=()=>{tAll.classList.add('on');tPM.classList.remove('on');render(false);};
tPM.onclick=()=>{tPM.classList.add('on');tAll.classList.remove('on');render(true);};
tabs.appendChild(tAll); tabs.appendChild(tPM);
document.getElementById('rc-slot').appendChild(tabs);
render(false);
</script>
</body>
</html>
