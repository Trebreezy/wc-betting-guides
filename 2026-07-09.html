<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Edge Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ————— Sunlit editorial: warm paper, forest green, olive, tan, brick ————— */
:root{
  --paper:#f3ede0;        /* warm cream */
  --paper2:#ede5d3;       /* deeper cream */
  --card:#faf6ec;         /* card surface */
  --ink:#26221a;          /* warm near-black */
  --ink-2:#5c5546;        /* warm gray-brown */
  --ink-3:#8a8271;        /* faint */
  --green:#2f5233;        /* deep forest */
  --green-2:#48693f;      /* leaf */
  --olive:#75774a;
  --tan:#b39868;
  --tan-line:#d8cbaf;     /* hairline borders */
  --brick:#a6432e;        /* accent / best-bet */
  --brick-soft:#f0dcd4;
  --r:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; color:var(--ink);
  font-family:'Instrument Sans',system-ui,sans-serif;
  font-size:16px; line-height:1.65;
  background:
    radial-gradient(900px 480px at 85% -6%, rgba(72,105,63,.10), transparent 62%),
    radial-gradient(720px 420px at -8% 12%, rgba(179,152,104,.14), transparent 58%),
    var(--paper);
  padding-bottom:72px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px; margin:0 auto; padding:0 22px}
h1,h2,h3{font-family:'Fraunces',serif; line-height:1.1; margin:0; letter-spacing:-.01em}
.mono{font-family:'Spline Sans Mono',monospace}
a{color:var(--green); text-decoration:none}

/* ————— Masthead ————— */
.hero{border-bottom:2px solid var(--ink); padding:44px 0 26px; position:relative}
.hero .eyebrow{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.24em;
  text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:10px}
.hero .eyebrow::before{content:""; width:26px; height:2px; background:var(--brick)}
.hero h1{font-size:clamp(36px,6.4vw,58px); font-weight:600; margin:14px 0 8px}
.hero h1 em{font-style:italic; color:var(--green)}
.hero .sub{font-size:clamp(15px,2.1vw,18px); color:var(--ink-2); max-width:620px; margin:0}
.hero .stamp{margin-top:18px; display:flex; flex-wrap:wrap; gap:8px}
.chip{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-2);
  background:var(--card); border:1px solid var(--tan-line); border-radius:999px; padding:5px 12px}
.chip b{color:var(--ink)}

/* ————— Report card strip (optional) ————— */
.rc{display:flex; flex-wrap:wrap; gap:10px 22px; align-items:baseline; margin-top:26px;
  background:var(--card); border:1px solid var(--tan-line); border-left:4px solid var(--olive);
  border-radius:var(--r); padding:14px 18px}
.rc .t{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--olive)}
.rc .rec{font-family:'Fraunces',serif; font-size:20px; font-weight:600}
.rc .note{font-size:13.5px; color:var(--ink-2); flex-basis:100%}

/* ————— Mode tabs (All books vs Prediction markets only) ————— */
.tabs{display:flex; gap:8px; margin-top:26px}
.tab{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  border:1.5px solid var(--tan-line); background:var(--card); color:var(--ink-2);
  border-radius:999px; padding:8px 16px; cursor:pointer}
.tab.on{border-color:var(--green); background:var(--green); color:#fff}
.tab:focus-visible{outline:2px solid var(--brick); outline-offset:2px}
.pm-note{font-size:13px; color:var(--ink-3); margin-top:8px}
.sport-tag{font-family:'Spline Sans Mono',monospace; font-size:10.5px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--olive); border:1px solid var(--tan-line);
  border-radius:5px; padding:2px 8px}
.nopm{font-size:14px; color:var(--ink-3); font-style:italic; padding:6px 0}

/* ————— Match cards ————— */
.games{display:grid; gap:34px; margin-top:38px}
.game{background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35);
  opacity:0; transform:translateY(14px); animation:rise .55s ease forwards; overflow:hidden}
@keyframes rise{to{opacity:1; transform:none}}
.g-head{padding:24px 26px 18px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(179,152,104,.08), transparent)}
.g-head .when{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.g-head h2{font-size:clamp(24px,4vw,34px); font-weight:600; margin-top:6px}
.g-head h2 .at{color:var(--tan); font-style:italic; font-weight:400; padding:0 4px}
.badge-live{display:inline-flex; align-items:center; gap:7px; font-family:'Spline Sans Mono',monospace;
  font-size:10.5px; font-weight:600; letter-spacing:.1em; color:#fff; background:var(--brick);
  border-radius:999px; padding:4px 11px}
.badge-live .dot{width:7px;height:7px;border-radius:50%;background:#fff; animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.livestate{margin-top:10px; font-family:'Spline Sans Mono',monospace; font-size:13px; color:var(--brick);
  background:var(--brick-soft); border-radius:9px; padding:8px 12px; display:inline-block}

.g-body{padding:6px 26px 24px}
.blk{padding:18px 0; border-bottom:1px solid var(--tan-line)}
.blk:last-child{border-bottom:none}
.blk .k{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.2em;
  text-transform:uppercase; color:var(--green); margin-bottom:9px; display:flex; align-items:center; gap:9px}
.blk .k::after{content:""; flex:1; height:1px; background:var(--tan-line)}
.blk .v{font-size:15px; color:var(--ink-2)}
.blk .v b, .blk .v strong{color:var(--ink)}
.blk .v p{margin:0 0 10px} .blk .v p:last-child{margin-bottom:0}
.blk.script .v{font-size:15.5px}
.blk.alt .k{color:var(--olive)}
.alt-branch{background:var(--paper2); border-left:3px solid var(--olive); border-radius:0 10px 10px 0;
  padding:11px 15px; margin:9px 0; font-size:14.5px; color:var(--ink-2)}
.alt-branch b{color:var(--ink)}

/* ————— The board (bets) ————— */
.blk.board .k{color:var(--brick)}
.bets{display:grid; gap:12px; margin-top:2px}
.bet{border:1px solid var(--tan-line); border-radius:12px; padding:15px 17px; background:var(--paper)}
.bet.best{border-color:var(--brick); border-width:1.5px; background:linear-gradient(180deg, rgba(166,67,46,.05), transparent), var(--paper)}
.bet-top{display:flex; justify-content:space-between; gap:14px; align-items:baseline; flex-wrap:wrap}
.bet-top .name{font-family:'Fraunces',serif; font-size:18px; font-weight:600}
.bet-top .price{font-family:'Spline Sans Mono',monospace; font-weight:700; font-size:17px; color:var(--green); white-space:nowrap}
.bet-top .price small{font-weight:400; color:var(--ink-3); font-size:11.5px; margin-left:6px}
.flag{display:inline-block; font-family:'Spline Sans Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; border-radius:5px; padding:3px 8px; margin-right:9px; vertical-align:2px}
.flag.best{background:var(--brick); color:#fff}
.flag.strong{background:var(--green); color:#fff}
.flag.value{background:transparent; color:var(--olive); border:1.5px solid var(--olive)}
.flag.flyer{background:transparent; color:var(--tan); border:1.5px solid var(--tan)}
.legs{list-style:none; margin:10px 0 2px; padding:0}
.legs li{padding:5px 0 5px 20px; position:relative; font-size:14.5px; color:var(--ink-2); border-bottom:1px dashed var(--tan-line)}
.legs li:last-child{border-bottom:none}
.legs li::before{content:"+"; position:absolute; left:2px; color:var(--brick); font-weight:700}
.bet-meta{margin-top:10px; display:grid; gap:6px}
.bet-meta .m{font-size:13.5px; color:var(--ink-2); padding-left:86px; position:relative}
.bet-meta .m .lbl{position:absolute; left:0; top:1px; font-family:'Spline Sans Mono',monospace; font-size:10px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.bet-meta .m.edge .lbl{color:var(--green)}
.bet-meta .m.edge{font-family:'Spline Sans Mono',monospace; font-size:12.5px; color:var(--green-2)}

/* ————— Futures board ————— */
.futures{margin-top:34px; background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35); overflow:hidden}
.futures .f-head{padding:20px 26px 14px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(47,82,51,.06), transparent)}
.futures .f-head h2{font-size:clamp(20px,3.4vw,28px); font-weight:600}
.futures .f-head .sub{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-3); margin-top:4px}
.futures .f-body{padding:14px 26px 22px}
.f-horizon{font-family:'Spline Sans Mono',monospace; font-size:10.5px; color:var(--ink-3)}

/* ————— Footer ————— */
footer{margin-top:52px; border-top:2px solid var(--ink); padding-top:22px}
.disclaimer{font-size:13px; color:var(--ink-3); line-height:1.6}
.disclaimer b{color:var(--ink-2)}

@media(max-width:640px){
  .g-head, .g-body{padding-left:18px; padding-right:18px}
  .bet-meta .m{padding-left:0; padding-top:16px}
  .bet-meta .m .lbl{top:0}
}
</style>
</head>

<script>
/* DATA is injected below. Schema (per RUNBOOK-morning.md step 5):
   meta{eyebrow, heroSub, chips[], disclaimer}
   reportCard{record, roi, note}?               — optional strip under the masthead
   games[]{sport:'World Cup'|'Wimbledon'|..., matchup, venue, ko, status:'PRE'|'LIVE', liveState?,

   the headline quote is a sportsbook. The PM tab shows only pm bets + all futures.
   Concluded games are OMITTED entirely (not rendered as reference). */
const DATA = {"meta": {"eyebrow": "World Cup quarterfinals begin — Wimbledon semifinal Thursday", "heroSub": "Thursday, July 9 — the quarterfinals open with the rematch everyone circled: France–Morocco at Gillette Stadium, 2022's semifinal replayed in front of what Boston has turned into a Moroccan home crowd. Our card clusters on one read the market only half-prices: with Saibari out, this is two elite defensive structures in 90° heat, and the goals market is still quoting a normal game. At Wimbledon, the women's semi we flagged yesterday (Noskova–Kostyuk) prices exactly like Osaka–Muchova did on Tuesday — overall form fully priced, grass-specific class discounted — and we're taking the same side of that trade again.", "chips": ["WC QF1: France–Morocco 4:00 PM ET", "Wimbledon women's SFs (Gauff–Muchova in a deciding TB at build; Noskova–Kostyuk follows)", "Odds pulled 10:40–11:40 AM ET", "PELE snapshot Jul 3–5 (pre-QF) — ratings anchor only, market leads", "Every pick adversarially fact-verified (inputs audit)", "Kalshi combos offline (key truncated in env)"], "disclaimer": "For entertainment. Edges are our independent projection vs. the de-vigged price — most of the board is fairly priced and we say so. Lineups are PROJECTED until ~2:45 PM ET; reprice at the teamsheet. 21+, legal books only, only what you can afford to lose."}, "reportCard": {"record": "Yesterday 0-1", "roi": "-0.25u", "note": "A one-pick card, and it lost cleanly: Fritz live at 40c died with the guide's own pre-registered falsification signature firing verbatim (Zverev held set one untouched and pulled away). Graded a thesis failure, not variance — and the new live-entry rule it produced is applied today. The passes were the wins: Cobolli at 71.5c passed as efficient (he lost to Fery in straights), Fritz outright passed at 11-12c (he's out)."}, "games": [{"sport": "Wimbledon", "matchup": "Linda Noskova (9) vs Marta Kostyuk (12)", "venue": "Wimbledon · Women's SF — Centre Court, second match (follows Gauff–Muchova)", "ko": "Thu Jul 9 · ~12:00 PM ET (queued behind the first semi)", "status": "PRE", "lineups": "<p><b>Noskova:</b> first career slam semifinal, and the best grass month of anyone left in either draw — won Berlin (WTA 500) two weeks ago over Pegula for her first grass title, 10-1 on grass this season, tour-leading 18 grass wins across the past two seasons. Path here: saved a match point against Cirstea in R3, then beat Keys 6-4 7-6(2) and Mertens 6-3 7-5 — 11-for-11 on serve in the QF, one break point faced, 7 aces. No physical flags. <b>Kostyuk:</b> the season form is real — 21 wins in her last 22 matches, a second CONSECUTIVE slam semi (RG last month), and the tournament's best return numbers (48.7% return points won, tops among the last 32). But the grass résumé is the asymmetry: career 10-25 on grass including qualifying, best Wimbledon before this was 3R, withdrew from Queen's with a right ankle injury and arrived here having lost every practice set. Her QF was her most efficient yet (69 minutes, 8/8 holds, zero break points faced vs Paolini) — on 50% first serves in, the fragile number in an otherwise clean sheet. No MTOs or taping this fortnight for either.</p>", "script": "<p>The market says 57–43 Kostyuk and the split is easy to name: every season-long input (overall Elo 2057 vs 1976, the 21-of-22 run, back-to-back slam semis) favors Kostyuk, and every surface-specific input favors Noskova — Tennis Abstract's GRASS Elo has Noskova +107 (1844 vs 1737, ~65% by that metric alone), plus the Berlin title, the ace and first-serve-percentage edges this fortnight, and 2-0 in tiebreaks here. The market is blending those; the surface-weighted read says this is closer to a coin flip than a 57–43. That's the same shape as Tuesday's Osaka–Muchova trade — hot hard-metric form priced fully, grass translation priced lightly — which cashed at 44c.</p><p>How it actually unfolds: hot, dry, 30°C London afternoon — the fastest Centre Court conditions of the fortnight, which compresses points and rewards Noskova's flat first-strike serve+1 before Kostyuk's defense can get into rallies. Kostyuk's elite return (the best weapon either woman owns) meets the serve that just went 11/11 vs Mertens; whoever wins that collision wins the match. Kostyuk's route is extending points and dragging Noskova's second serve into grinding exchanges — it worked on Madrid clay (their only H2H, 7-6 6-0 Kostyuk). On this surface, in this heat, on a 50% first-serve day she doesn't get enough of those looks. Nerves cut both ways and honestly: Noskova's first slam SF vs Kostyuk's flat 76-minute no-show in the RG semi last month.</p><p><b>Falsification signature (pre-registered):</b> the thesis is Noskova's serve travels. If Kostyuk breaks Noskova TWICE in set one, the mechanism has failed — that's losing, not unlucky, and no live re-entry should chase it.</p>", "altFutures": ["If Noskova wins: she'd be the live underdog-priced finalist against the Gauff–Muchova winner — her outright at 21-22c effectively doubles; no need to pre-buy it, the match price IS the trade.", "If this match starts LATE (the first semi went deep into a third set): no read change — both players wait equally.", "Match total games (books only): the serve-dominance read implies tiebreak risk both ways; we couldn't quote it through our tooling and pass rather than guess."], "bets": [{"kind": "single", "tier": "strong", "label": "Linda Noskova to win (match, incl. any retirement per Kalshi rules)", "price": "43c<small>Kalshi</small>", "book": "Kalshi", "pm": true, "pmNote": "43c<small>KXWTAMATCH-26JUL09KOSNOS · Noskova YES (bid 41 / ask 43)</small>", "mustBeTrue": "Noskova's serve holds up under the tournament's best return game — grass-specific class beats season-long form.", "edge": "model ~48.5% vs de-vig 42.2% (+6.3) — grass Elo +107 her way (verified at Tennis Abstract), Berlin title, and the market's blend overweights overall form"}]}, {"sport": "World Cup", "matchup": "France vs Morocco", "venue": "World Cup QF1 · Gillette Stadium, Foxborough — open air, ~90°F at kickoff (NWS high 93), heavily pro-Morocco crowd", "ko": "Thu Jul 9 · 4:00 PM ET", "status": "PRE", "lineups": "<p><b>France (PROJECTED 4-2-3-1):</b> Maignan; Koundé, Upamecano, Saliba, Digne; Koné (or Tchouaméni, late fitness test), Rabiot; Dembélé, Olise, Barcola/Doué; Mbappé. No rotation expected. Thuram (calf) is back in training but bench-only; Mateta is the fit backup striker — the identical +215 anytime prices on both are SUB-ONLY props and we treat them that way. Olise (first-choice corner taker — five corners in each of the last two games) lost his yellow-card appeal — one booking from a semifinal ban. <b>Morocco (PROJECTED 4-2-3-1):</b> Bounou; Hakimi, Diop, Riad (monitor — Halhal deputized last round), Mazraoui; El Aynaoui, Bouaddi; Díaz, Ounahi, El Khannouss; Rahimi. <b>Saibari is OUT (hamstring)</b> — their most in-form scorer (scored in all three group games) and their leading presser. Aguerd never made the squad; Bounou is fit. <b>Reprice at the teamsheet ~2:45 PM ET.</b></p>", "script": "<p>The market prices the 2022 semifinal rematch France 61 / draw 24.5 / Morocco 14.5, and on the 1X2 we have no quarrel — Opta lands within a point of the same numbers and stale PELE (Jul 3–5 snapshot, pre-QF) brackets it from the other side. The disagreement is the SHAPE of the game, not the winner. Morocco's knockout identity is the most extreme defensive profile left in the field: they held the Netherlands to 0.23 xG over 120 minutes, then beat Canada 3-0 while attempting FIVE shots — and that ruthless efficiency just lost its engine, because Saibari (3 goals, team-leading sprints and pressures) is out. France, meanwhile, have already shown what they do against a set low block in American heat: 15 shots, 1.36 xG and a penalty-only 1-0 over Paraguay in Philadelphia. Now add ~90°F at kickoff, an open-air stadium, a sellout crowd that Al Jazeera describes as Boston 'painted red' for Morocco, and a French side whose own coach spent the week talking about needing to be 'more efficient' — everything in this game points at a low-event, high-tension grind, and the totals market is still quoting a nearly normal game (Over 2.5 at 47.5%). Our number on Under 2.5 is ~58%. That five-point gap, with three independent nameable drivers (Saibari out, both teams' knockout shot profiles, the heat), is the card's spine.</p><p>The second disagreement is the extra-time branch. The market's own prices imply that if this reaches ET, France converts ~66% of the time — a number that treats France's depth as decisive. But the shootout sub-branch runs the other way: Bounou saved in the shootout that eliminated the Dutch two weeks ago (and broke Spain in 2022), while France lost their last two major-tournament shootouts (the 2022 final, Euro 2021 vs Switzerland). One honest shave our own verification forced: Saibari wasn't just Morocco's form scorer — he converted the WINNING penalty against the Dutch, and Morocco missed two kicks in that shootout (including Hakimi), so the pens edge is Bounou, not the takers. Weighting ET outcomes honestly — France's bench wave is real, pens behind Bounou lean Morocco — puts Morocco-to-advance near 25.5-26% against a 23c Kalshi ask. Same thesis, opposite tail: the tighter and longer this game stays, the better both our positions get. What we are NOT doing: the house shots-over template. Morocco without Saibari has no designated volume chaser (Hakimi shoots about once a game; the team took five shots in a knockout it WON), and the July 7 rule is explicit — a dog-chaser over needs a dog that actually chases with volume. Passed, along with Mbappé anytime at -110 (fairly priced pen-inclusive) and both sub-striker props.</p><p><b>Falsification signatures (pre-registered):</b> if this is 2-1 by the hour — set-piece chaos or an early Morocco goal forcing France to open up — the low-event read was wrong, not unlucky. If France carve the block open twice by halftime with Morocco stretched, same verdict; do not chase the Under live at a worse number.</p>", "altFutures": ["If Morocco score first (their 3/5 games this WC): France chase in heat against the best block in the field — the draw and Morocco-to-advance both spike; our 23c advance position is the pre-positioned expression, don't add live.", "If Tchouaméni is ruled out at the teamsheet: no repricing needed (Koné has started both knockouts); if MAIGNAN or a CB is a surprise scratch, the BTTS-No leg weakens — kill the SGP.", "If France lead by two before 60': the Under is dead but the SGP's France leg is armored — expect Deschamps to shut the game down (they've conceded twice all tournament)."], "bets": [{"kind": "single", "tier": "best", "label": "Under 2.5 goals — regulation", "price": "53c<small>Kalshi (NO on O2.5)</small>", "book": "Kalshi", "pm": true, "pmNote": "53c<small>KXWCTOTAL-26JUL09FRAMAR · O2.5 NO</small>", "mustBeTrue": "Two elite defensive structures in 90° heat produce a grind — no three-goal game in 90 minutes.", "edge": "model ~58% vs market 52.5% (+5.5) — Saibari out, Morocco's 5-shot knockout profile, France's 1.36 xG vs a block in heat"}, {"kind": "sgp", "tier": "strong", "label": "France reg-time ML + BTTS No (France win to nil)", "price": "+230 floor<small>DraftKings SGP</small>", "book": "DraftKings", "pm": false, "legs": ["France moneyline (regulation) −175", "Both teams to score — No −125"], "correlation": "Strongly positively correlated: France's modal winning scripts (1-0 / 2-0) ARE clean sheets — the block-and-counter side that has to chase loses its one scoring engine (Saibari) and its counters die as France manage the lead. Book prices legs near-independently.", "mustBeTrue": "France win in 90 without conceding — the Paraguay script against better opposition.", "edge": "our joint ~38% vs ~30% implied at +230 (+8) — take +230 or better, else pass; the Jul 6 Spain–Portugal template exactly"}, {"kind": "single", "tie const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const app=document.getElementById('app');

document.getElementById('hero-eyebrow').textContent = DATA.meta.eyebrow || 'World Cup 2026';
document.getElementById('hero-sub').textContent = DATA.meta.heroSub || '';
const stamp=document.getElementById('hero-stamp');
(DATA.meta.chips||[]).forEach(c=>stamp.appendChild(el('span','chip',c)));
document.getElementById('disclaimer').innerHTML = DATA.meta.disclaimer || '';

if(DATA.reportCard){
  const rc=el('div','rc');
  rc.appendChild(el('span','t','Yesterday'));
  rc.appendChild(el('span','rec',DATA.reportCard.record||''));
  if(DATA.reportCard.roi) rc.appendChild(el('span','rec mono',DATA.reportCard.roi));
  if(DATA.reportCard.note) rc.appendChild(el('div','note',DATA.reportCard.note));
  document.getElementById('rc-slot').appendChild(rc);
}

const TIER_ORDER={best:0,strong:1,value:2,flyer:3};
const TIER_LABEL={best:'Best Bet',strong:'Strong',value:'Value',flyer:'Flyer'};

function renderBet(x, pmMode){
  const card=el('div','bet'+(x.tier==='best'?' best':''));
  const top=el('div','bet-top');
  const nm=el('div','name');
  nm.appendChild(el('span','flag '+x.tier,TIER_LABEL[x.tier]||x.tier));
  nm.appendChild(document.createTextNode(x.label));
  top.appendChild(nm);
  const priceTxt = (pmMode && x.pmNote) ? x.pmNote : (x.price+(x.book?'<small>'+x.book+'</small>':''));
  top.appendChild(el('div','price',priceTxt));
  card.appendChild(top);
  if(x.legs && x.legs.length){
    const ul=el('ul','legs'); x.legs.forEach(l=>ul.appendChild(el('li',null,l))); card.appendChild(ul);
  }
  const meta=el('div','bet-meta');
  const addM=(cls,lbl,txt)=>{const m=el('div','m '+cls); m.appendChild(el('span','lbl',lbl)); m.appendChild(document.createTextNode(' '+txt)); meta.appendChild(m);};
  if(x.correlation) addM('','Correlation',x.correlation);
  if(x.mustBeTrue) addM('','Needs',x.mustBeTrue);
  if(x.edge) addM('edge','Edge',x.edge);
  if(!pmMode && x.pm && x.pmNote) addM('','Kalshi',x.pmNote.replace(/<[^>]*>/g,''));
  if(x.horizon) addM('','Settles',x.horizon);
  card.appendChild(meta);
  return card;
}

function render(pmMode){
  app.innerHTML='';
  if(pmMode) app.appendChild(el('p','pm-note','Prediction-market mode: only Kalshi-executable plays (legal in GA/CA — no sportsbook required). Analysis unchanged.'));
  const gw=el('div','games');
  (DATA.games||[]).forEach((g,gi)=>{
    const c=el('article','game'); c.style.animationDelay=(gi*.09)+'s';
    const head=el('div','g-head');
    const when=el('div','when', g.ko+' &middot; '+g.venue);
    if(g.sport) when.appendChild(el('span','sport-tag',g.sport));
    if(g.status==='LIVE'){
      const lb=el('span','badge-live'); lb.appendChild(el('span','dot')); lb.appendChild(document.createTextNode('LIVE'));
      when.appendChild(lb);
    }
    head.appendChild(when);
    head.appendChild(el('h2',null,g.matchup.replace(/\s+(vs\.?|v|—|-)\s+/i,' <span class="at">v</span> ')));
    if(g.status==='LIVE' && g.liveState) head.appendChild(el('div','livestate',g.liveState));
    c.appendChild(head);

    const bd=el('div','g-body');
    const blk=(cls,k,vHtml)=>{const b=el('div','blk '+cls); b.appendChild(el('div','k',k)); b.appendChild(el('div','v',vHtml)); bd.appendChild(b); return b;};

    if(g.lineups) blk('','Lineups &amp; News', g.lineups);
    if(g.script)  blk('script','The Script', g.script);
    if(g.altFutures){
      const b=el('div','blk alt'); b.appendChild(el('div','k','Alternative Futures'));
      const v=el('div','v');
      (Array.isArray(g.altFutures)?g.altFutures:[g.altFutures]).forEach(a=>v.appendChild(el('div','alt-branch',a)));
      b.appendChild(v); bd.appendChild(b);
    }

    const bets = (g.bets||[]).filter(x=>!pmMode || x.pm);
    const b=el('div','blk board');
    b.appendChild(el('div','k','The Board — '+bets.length+' play'+(bets.length===1?'':'s')));
    if(bets.length){
      const list=el('div','bets');
      [...bets].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>list.appendChild(renderBet(x,pmMode)));
      b.appendChild(list);
    } else {
      b.appendChild(el('div','nopm', pmMode?'No Kalshi-executable edge in this match — analysis above still stands.':'No plays passed the edge bar.'));
    }
    bd.appendChild(b);
    c.appendChild(bd); gw.appendChild(c);
  });
  app.appendChild(gw);

  if(DATA.futures && DATA.futures.length){
    const f=el('section','futures');
    const fh=el('div','f-head');
    fh.appendChild(el('h2',null,'Futures Board'));
    fh.appendChild(el('div','sub','Tournament-level positions on Kalshi — tracked nightly in the ledger until they settle.'));
    f.appendChild(fh);
    const fb=el('div','f-body');
    const list=el('div','bets');
    [...DATA.futures].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>{
      const card=renderBet({...x, book:x.ticker, pm:true}, false);
      list.appendChild(card);
    });
    fb.appendChild(list); f.appendChild(fb); app.appendChild(f);
  }
}

// tabs
const tabs=el('div','tabs');
const tAll=el('button','tab on','All books');
const tPM=el('button','tab','Prediction markets');
tAll.onclick=()=>{tAll.classList.add('on');tPM.classList.remove('on');render(false);};
tPM.onclick=()=>{tPM.classList.add('on');tAll.classList.remove('on');render(true);};
tabs.appendChild(tAll); tabs.appendChild(tPM);
document.getElementById('rc-slot').appendChild(tabs);
render(false);
</script>
