<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Edge Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ————— Sunlit editorial: warm paper, forest green, olive, tan, brick ————— */
:root{
  --paper:#f3ede0;        /* warm cream */
  --paper2:#ede5d3;       /* deeper cream */
  --card:#faf6ec;         /* card surface */
  --ink:#26221a;          /* warm near-black */
  --ink-2:#5c5546;        /* warm gray-brown */
  --ink-3:#8a8271;        /* faint */
  --green:#2f5233;        /* deep forest */
  --green-2:#48693f;      /* leaf */
  --olive:#75774a;
  --tan:#b39868;
  --tan-line:#d8cbaf;     /* hairline borders */
  --brick:#a6432e;        /* accent / best-bet */
  --brick-soft:#f0dcd4;
  --r:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; color:var(--ink);
  font-family:'Instrument Sans',system-ui,sans-serif;
  font-size:16px; line-height:1.65;
  background:
    radial-gradient(900px 480px at 85% -6%, rgba(72,105,63,.10), transparent 62%),
    radial-gradient(720px 420px at -8% 12%, rgba(179,152,104,.14), transparent 58%),
    var(--paper);
  padding-bottom:72px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px; margin:0 auto; padding:0 22px}
h1,h2,h3{font-family:'Fraunces',serif; line-height:1.1; margin:0; letter-spacing:-.01em}
.mono{font-family:'Spline Sans Mono',monospace}
a{color:var(--green); text-decoration:none}

/* ————— Masthead ————— */
.hero{border-bottom:2px solid var(--ink); padding:44px 0 26px; position:relative}
.hero .eyebrow{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.24em;
  text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:10px}
.hero .eyebrow::before{content:""; width:26px; height:2px; background:var(--brick)}
.hero h1{font-size:clamp(36px,6.4vw,58px); font-weight:600; margin:14px 0 8px}
.hero h1 em{font-style:italic; color:var(--green)}
.hero .sub{font-size:clamp(15px,2.1vw,18px); color:var(--ink-2); max-width:620px; margin:0}
.hero .stamp{margin-top:18px; display:flex; flex-wrap:wrap; gap:8px}
.chip{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-2);
  background:var(--card); border:1px solid var(--tan-line); border-radius:999px; padding:5px 12px}
.chip b{color:var(--ink)}

/* ————— Report card strip (optional) ————— */
.rc{display:flex; flex-wrap:wrap; gap:10px 22px; align-items:baseline; margin-top:26px;
  background:var(--card); border:1px solid var(--tan-line); border-left:4px solid var(--olive);
  border-radius:var(--r); padding:14px 18px}
.rc .t{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--olive)}
.rc .rec{font-family:'Fraunces',serif; font-size:20px; font-weight:600}
.rc .note{font-size:13.5px; color:var(--ink-2); flex-basis:100%}

/* ————— Mode tabs (All books vs Prediction markets only) ————— */
.tabs{display:flex; gap:8px; margin-top:26px}
.tab{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  border:1.5px solid var(--tan-line); background:var(--card); color:var(--ink-2);
  border-radius:999px; padding:8px 16px; cursor:pointer}
.tab.on{border-color:var(--green); background:var(--green); color:#fff}
.tab:focus-visible{outline:2px solid var(--brick); outline-offset:2px}
.pm-note{font-size:13px; color:var(--ink-3); margin-top:8px}
.sport-tag{font-family:'Spline Sans Mono',monospace; font-size:10.5px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--olive); border:1px solid var(--tan-line);
  border-radius:5px; padding:2px 8px}
.nopm{font-size:14px; color:var(--ink-3); font-style:italic; padding:6px 0}

/* ————— Match cards ————— */
.games{display:grid; gap:34px; margin-top:38px}
.game{background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35);
  opacity:0; transform:translateY(14px); animation:rise .55s ease forwards; overflow:hidden}
@keyframes rise{to{opacity:1; transform:none}}
.g-head{padding:24px 26px 18px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(179,152,104,.08), transparent)}
.g-head .when{font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.g-head h2{font-size:clamp(24px,4vw,34px); font-weight:600; margin-top:6px}
.g-head h2 .at{color:var(--tan); font-style:italic; font-weight:400; padding:0 4px}
.badge-live{display:inline-flex; align-items:center; gap:7px; font-family:'Spline Sans Mono',monospace;
  font-size:10.5px; font-weight:600; letter-spacing:.1em; color:#fff; background:var(--brick);
  border-radius:999px; padding:4px 11px}
.badge-live .dot{width:7px;height:7px;border-radius:50%;background:#fff; animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.livestate{margin-top:10px; font-family:'Spline Sans Mono',monospace; font-size:13px; color:var(--brick);
  background:var(--brick-soft); border-radius:9px; padding:8px 12px; display:inline-block}

.g-body{padding:6px 26px 24px}
.blk{padding:18px 0; border-bottom:1px solid var(--tan-line)}
.blk:last-child{border-bottom:none}
.blk .k{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.2em;
  text-transform:uppercase; color:var(--green); margin-bottom:9px; display:flex; align-items:center; gap:9px}
.blk .k::after{content:""; flex:1; height:1px; background:var(--tan-line)}
.blk .v{font-size:15px; color:var(--ink-2)}
.blk .v b, .blk .v strong{color:var(--ink)}
.blk .v p{margin:0 0 10px} .blk .v p:last-child{margin-bottom:0}
.blk.script .v{font-size:15.5px}
.blk.alt .k{color:var(--olive)}
.alt-branch{background:var(--paper2); border-left:3px solid var(--olive); border-radius:0 10px 10px 0;
  padding:11px 15px; margin:9px 0; font-size:14.5px; color:var(--ink-2)}
.alt-branch b{color:var(--ink)}

/* ————— The board (bets) ————— */
.blk.board .k{color:var(--brick)}
.bets{display:grid; gap:12px; margin-top:2px}
.bet{border:1px solid var(--tan-line); border-radius:12px; padding:15px 17px; background:var(--paper)}
.bet.best{border-color:var(--brick); border-width:1.5px; background:linear-gradient(180deg, rgba(166,67,46,.05), transparent), var(--paper)}
.bet-top{display:flex; justify-content:space-between; gap:14px; align-items:baseline; flex-wrap:wrap}
.bet-top .name{font-family:'Fraunces',serif; font-size:18px; font-weight:600}
.bet-top .price{font-family:'Spline Sans Mono',monospace; font-weight:700; font-size:17px; color:var(--green); white-space:nowrap}
.bet-top .price small{font-weight:400; color:var(--ink-3); font-size:11.5px; margin-left:6px}
.flag{display:inline-block; font-family:'Spline Sans Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; border-radius:5px; padding:3px 8px; margin-right:9px; vertical-align:2px}
.flag.best{background:var(--brick); color:#fff}
.flag.strong{background:var(--green); color:#fff}
.flag.value{background:transparent; color:var(--olive); border:1.5px solid var(--olive)}
.flag.flyer{background:transparent; color:var(--tan); border:1.5px solid var(--tan)}
.legs{list-style:none; margin:10px 0 2px; padding:0}
.legs li{padding:5px 0 5px 20px; position:relative; font-size:14.5px; color:var(--ink-2); border-bottom:1px dashed var(--tan-line)}
.legs li:last-child{border-bottom:none}
.legs li::before{content:"+"; position:absolute; left:2px; color:var(--brick); font-weight:700}
.bet-meta{margin-top:10px; display:grid; gap:6px}
.bet-meta .m{font-size:13.5px; color:var(--ink-2); padding-left:86px; position:relative}
.bet-meta .m .lbl{position:absolute; left:0; top:1px; font-family:'Spline Sans Mono',monospace; font-size:10px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.bet-meta .m.edge .lbl{color:var(--green)}
.bet-meta .m.edge{font-family:'Spline Sans Mono',monospace; font-size:12.5px; color:var(--green-2)}

/* ————— Futures board ————— */
.futures{margin-top:34px; background:var(--card); border:1px solid var(--tan-line); border-radius:18px;
  box-shadow:0 22px 44px -30px rgba(38,34,26,.35); overflow:hidden}
.futures .f-head{padding:20px 26px 14px; border-bottom:1px solid var(--tan-line);
  background:linear-gradient(180deg, rgba(47,82,51,.06), transparent)}
.futures .f-head h2{font-size:clamp(20px,3.4vw,28px); font-weight:600}
.futures .f-head .sub{font-family:'Spline Sans Mono',monospace; font-size:11.5px; color:var(--ink-3); margin-top:4px}
.futures .f-body{padding:14px 26px 22px}
.f-horizon{font-family:'Spline Sans Mono',monospace; font-size:10.5px; color:var(--ink-3)}

/* ————— Footer ————— */
footer{margin-top:52px; border-top:2px solid var(--ink); padding-top:22px}
.disclaimer{font-size:13px; color:var(--ink-3); line-height:1.6}
.disclaimer b{color:var(--ink-2)}

@media(max-width:640px){
  .g-head, .g-body{padding-left:18px; padding-right:18px}
  .bet-meta .m{padding-left:0; padding-top:16px}
  .bet-meta .m .lbl{top:0}
}
</style>
</head>
<body>
<header class="hero"><div class="wrap">
  <div class="eyebrow" id="hero-eyebrow">World Cup 2026</div>
  <h1>The <em>Edge</em> Report</h1>
  <p class="sub" id="hero-sub"></p>
  <div class="stamp" id="hero-stamp"></div>
  <div id="rc-slot"></div>
</div></header>

<main class="wrap" id="app"></main>

<footer class="wrap"><div class="disclaimer" id="disclaimer"></div></footer>

<script>
/* DATA is injected below. Schema (per RUNBOOK-morning.md step 5):
   meta{eyebrow, heroSub, chips[], disclaimer}
   reportCard{record, roi, note}?               — optional strip under the masthead
   games[]{sport:'World Cup'|'Wimbledon'|..., matchup, venue, ko, status:'PRE'|'LIVE', liveState?,
           lineups, script, altFutures?,
           bets[]{kind:'single'|'longshot'|'sgp', tier:'best'|'strong'|'value'|'flyer',
                  label, price, book?, pm:bool, pmNote?, legs[]?, correlation?, mustBeTrue, edge}}
   futures[]{sport, label, ticker, price, tier, mustBeTrue, edge, horizon}   — Kalshi futures (always PM)
   pm:true = executable on a prediction market (Kalshi); pmNote = the Kalshi ticker/price when
   the headline quote is a sportsbook. The PM tab shows only pm bets + all futures.
   Concluded games are OMITTED entirely (not rendered as reference). */
const DATA = {"meta": {"eyebrow": "Wimbledon quarterfinals — World Cup rest day", "heroSub": "Wednesday, July 8 — the World Cup takes a breath before tomorrow's France–Morocco quarterfinal, so today is all Wimbledon: both bottom-half men's QFs went live late morning ET. The card is one live edge (a market over-respecting Alexander Zverev's seed against the man who's beaten him seven straight times) plus documented passes everywhere the board is honest — including all four women's title futures, which we repriced and found efficient.", "chips": ["No WC games today (QFs start Thu)", "2 men's QFs, both LIVE at pick time", "Women's SFs set for Thu: Muchova–Gauff, Kostyuk–Noskova", "Odds pulled 10:35–11:25 AM ET (live, state-stamped)", "PELE snapshot Jul 5 — not load-bearing on an all-tennis day", "Kalshi combos offline (key truncated in env)"], "disclaimer": "For entertainment. Edges are our independent projection vs. the de-vigged price — most of this slate is fairly priced and we say so. Live prices move by the minute — the quoted price is the state-stamped price at pick time; reprice before you bet. 21+, legal books only, only what you can afford to lose."}, "reportCard": {"record": "Yesterday 2-4", "roi": "+0.005u (+0.4%)", "note": "Breakeven, carried entirely by the prediction markets: Kalshi picks went 2-0, +0.605u (+110%) — the Switzerland–Colombia BTTS-No injury thesis and the Muchova grass-Elo lean both cashed — while the DK-book picks went 0-4. The grading also vindicated two passes (Djokovic, Zverev resumption) and convicted one selection error: we took the longer-priced CB (L. Martínez +1900) and passed Romero +1000, who scored via the exact mechanism we published."}, "games": [{"sport": "Wimbledon", "matchup": "Flavio Cobolli vs Arthur Fery", "venue": "Wimbledon · Men's QF — Centre Court, first match", "ko": "Wed Jul 8 · 10:10 AM ET", "status": "LIVE", "liveState": "Set 1 · Fery 5–4 (on serve) · Kalshi ~71c Cobolli — no bet", "lineups": "<p><b>Cobolli (9):</b> the 2026 breakout — first ATP title (Acapulco), Roland Garros finalist last month (lost to Zverev in five), four top-10 wins this season, second straight Wimbledon QF. Path here: one five-setter (Khachanov from a 0-6 first set), then a statement 7-5 7-6 6-3 over de Minaur in 2h34. Rested since Monday. <b>Fery:</b> 23-year-old British wildcard, world No. 114, raised a mile from these courts — the first British wildcard of the Open Era to reach a Slam QF. But the run came against opponents ranked ~105–180 plus a diminished Dimitrov, and it cost him back-to-back marathons: 4h39 over Bergs (from 2-1 down) and 3h55 over Dimitrov (from 2-1 down), both five sets. No injury flags either side.</p>", "script": "<p>The market prices this 71–72% Cobolli and our research lands at ~70 — no edge, and both live angles cut against each other rather than compounding. The Fery case is real: he beat Cobolli in straight sets in a best-of-five five months ago (Australian Open R1, exposing Cobolli's second serve — 8 double faults that day, 15 this fortnight on 54.8% first serves in), he's 4-0 in tiebreaks this event, and Centre Court is maximally partisan for the local. The Cobolli case is at least as real: a genuinely elite 2026 (RG finalist), far stronger strength-of-schedule here, better serve numbers (75.5% first-serve points won, 45 aces), and the fatigue asymmetry — Fery has ~8.5 hours of court time in his last two matches alone against a man who finished his R16 in 2h34. Those offset into roughly the market's number.</p><p><b>Pass.</b> The one derivative we liked — Fery +5.5 games, live off his fresh-legs first set — isn't quotable through our tooling (Kalshi carries no tennis game-spreads; the Odds API returns h2h only for this event), and we don't publish prices we can't verify. Logged for transparency: Cobolli's chronic slow starts (three opening sets lost this fortnight, one of them a bagel) make the live Cobolli price a systematically better entry after set one than before it, if you're shopping this yourself.</p>", "bets": []}, {"sport": "Wimbledon", "matchup": "Alexander Zverev vs Taylor Fritz", "venue": "Wimbledon · Men's QF — No.1 Court, second match on (Centre went to the home story)", "ko": "Wed Jul 8 · 10:25 AM ET", "status": "LIVE", "liveState": "Set 1 · Zverev 3–2, one break up · Fritz bought at 40c (14:52 UTC)", "lineups": "<p><b>Zverev (2):</b> reigning French Open champion, best grass season of his career (7-1), grass Elo #4 — and in his FIRST career Wimbledon QF at the tenth attempt. The flag is the turnaround: his R16 was curfew-suspended Monday night and finished Tuesday afternoon, leaving ~22–24 hours between last ball and today's first — with ~10.5–11 hours of cumulative court time and six tiebreaks in his legs. His own words after Lehecka: 'I'm happy to be through in four sets and not having to play another set today.' <b>Fritz (6):</b> ~46 hours rest after a 1h41 dismantling of Bublik (22 aces, 90% first-serve points won), only one set dropped all event, ~2 hours less court time than Zverev. 2025 Wimbledon semifinalist, 11-2 on 2026 grass, five career grass titles to Zverev's zero. No injury flags either side; No.1 Court, roof open, ~30°C fast grass.</p>", "script": "<p>This is the day's one real disagreement with the board. The market closed roughly a coin flip with Fritz a hair ahead (−111/−115, ~52.5% de-vig) — a price that leans on Zverev's rating (grass Elo #4 vs #6, the much bigger overall gap, the RG title). Our number is Fritz ~55–57 pre-match, and the mechanism is nameable twice over. First, the matchup: <b>Fritz has won seven straight against Zverev</b> (10-5 overall), including their most recent meeting nineteen days ago on this surface (Halle SF, 6-7 6-4 7-5) — Fritz's flat first-strike return game keeps solving Zverev's serve while Zverev has made almost no impression on Fritz's (82.9% first-serve points won this fortnight). Ratings can't see a matchup skew; seven consecutive results can. Second, the schedule: Zverev is on a ~22–24 hour turnaround from a two-day match while Fritz has had two full nights after his shortest win of the event. Grass at 30°C with the roof open compresses everything toward serve-and-tiebreaks — and while Zverev is 5/6 in breakers this event, tiebreak-heavy tennis is exactly where the fresher, bigger first-strike player travels well.</p><p>By the time the card was priced, the live market had handed us a better entry, not a worse one: Zverev broke early in set one and Kalshi repriced Fritz from ~53c pre-match to the low 40s. Conditioning our 55–57 prior on 'down one early break in set one of five' — P(set from here) ~25%, P(match | lose set 1) ~35–38%, P(match | steal the set anyway) ~72% — puts live-fair Fritz at ~45% (verified range 43–47; our first-pass 46–48 was arithmetically 2 points generous and we corrected it). Independent corroboration: DraftKings' concurrent in-play line de-vigged to Fritz 46.8% while Kalshi sat at 41.5. That's a ~5 point gap at our midpoint on a 1-cent-spread binary with two named mechanisms the market is systematically slow on: seed/rating anchoring (the same anchor we beat with Muchova yesterday) and a fatigue asymmetry that matters MORE as the match goes long, not less. One honest caution: an early break is the exact way a tired-legs thesis would look if it were wrong — if Zverev serves through set one untouched and breaks early in set two, the thesis is losing, not unlucky. We size at the small end of conviction for a live entry.</p>", "altFutures": ["If Fritz steals set one anyway (Cobolli-style late break or a breaker): live Fritz jumps past 60 and the entry window is gone — this play only exists while the market overreacts to the early break.", "If Zverev takes set one comfortably on serve: our live-fair drops to ~40 and the residual edge is inside the spread — do NOT chase the falling price; the one-break entry was the bet.", "Winner meets Cobolli/Fery in Friday's SF: Fritz would open a heavy favorite over either; Zverev would open ~55-60 over Cobolli despite the RG final rematch narrative (he won it)."], "bets": [{"kind": "single", "tier": "strong", "label": "Taylor Fritz to win (LIVE — bought down an early break)", "price": "40c<small>KXATPMATCH-26JUL08FRIZVE · YES Fritz · state-stamped 3–2 Zverev, set 1</small>", "book": "Kalshi", "pm": true, "pmNote": "40c YES Fritz (KXATPMATCH-26JUL08FRIZVE), bought live at Zverev 3–2 up a break, 14:52 UTC", "mustBeTrue": "The seven-match H2H skew and the rest gap are worth more than one early break of serve — a matchup the ratings can't see, in legs that get heavier as the match gets longer.", "edge": "live model ~45% (verified 43–47; DK's concurrent in-play de-vig 46.8% agrees) vs 39.5–40c (+5 pts) — pre-match our 55–57 vs the ~52.5 close; both mechanisms named and fact-checked"}]}], "futures": [{"sport": "World Cup", "label": "Argentina to win the World Cup — HOLDING (opened Jul 5 @ 17c)", "ticker": "KXMENWORLDCUP-26 · YES Argentina", "price": "18c<small>mid mark today; entry 17c</small>", "tier": "strong", "mustBeTrue": "Argentina convert the path (Switzerland in Saturday's QF) at the model's rate, not the market's — they survived the Egypt scare that was the position's biggest single hurdle.", "edge": "Board today: France 33.8 / Spain 18.5 / Argentina 18.3 de-vig. Position rode 17→19→18.4 through the R16 comeback. No re-add (0.5u already open); PELE snapshot is pre-R16 so the original +8pt gap can't be re-verified until fresh CSVs land.", "horizon": "Settles Jul 19 (final)"}, {"sport": "Wimbledon", "label": "Women's title futures — REPRICED, all four PASSED", "ticker": "KXWTA-26WIM (Muchova 30-31c · Gauff 25-26c · Kostyuk 24-25c · Noskova 24-25c ask)", "price": "no bet", "tier": "value", "mustBeTrue": "Nothing — we're not buying. Our SF-by-SF arithmetic (grass Elo + form + H2H): Muchova 30.5% title, Gauff 23.9, Kostyuk 22.4, Noskova 23.2 — every ask is at or above fair. The Muchova grass story we bought at 44c in Tuesday's match market is now fully priced at the tournament level.", "edge": "Largest residual on the whole tennis board: Noskova ~50% fair vs 45.7 in Thursday's SF match market (grass Elo 1844 vs Kostyuk's stale 1737; Berlin 500 title; the market leans on a clay H2H and Kostyuk's non-grass streak) — +4.3pts, a whisker under our ≥4-5pt bar for efficient binaries. Flagged for TOMORROW's routine to reprice at Thursday's open.", "horizon": "SFs Thu Jul 9, final Sat Jul 11"}, {"sport": "Wimbledon", "label": "Men's board — Sinner 65-66c: no fade, no buy", "ticker": "KXATP-26WIM · Jannik Sinner", "price": "no bet", "tier": "flyer", "mustBeTrue": "Nothing — logged as checked. Sinner at 61.5 de-vig fair vs our ~59-61 arithmetic (78.4% over Djokovic Friday, ~75-78% over the bottom-half survivor in the final): the ask is a point or two rich but a NO position pays ~34c to risk 66 on the best player in the field converting two matches he's supposed to win. Not our kind of edge.", "edge": "Advance-ladder spreads (KXATPADVANCE-26WIMFIN: Fritz 31/75, Cobolli 13/49) are too wide to trade — noted for when liquidity arrives after today's QFs.", "horizon": "Final Sun Jul 12"}]};

const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const app=document.getElementById('app');

document.getElementById('hero-eyebrow').textContent = DATA.meta.eyebrow || 'World Cup 2026';
document.getElementById('hero-sub').textContent = DATA.meta.heroSub || '';
const stamp=document.getElementById('hero-stamp');
(DATA.meta.chips||[]).forEach(c=>stamp.appendChild(el('span','chip',c)));
document.getElementById('disclaimer').innerHTML = DATA.meta.disclaimer || '';

if(DATA.reportCard){
  const rc=el('div','rc');
  rc.appendChild(el('span','t','Yesterday'));
  rc.appendChild(el('span','rec',DATA.reportCard.record||''));
  if(DATA.reportCard.roi) rc.appendChild(el('span','rec mono',DATA.reportCard.roi));
  if(DATA.reportCard.note) rc.appendChild(el('div','note',DATA.reportCard.note));
  document.getElementById('rc-slot').appendChild(rc);
}

const TIER_ORDER={best:0,strong:1,value:2,flyer:3};
const TIER_LABEL={best:'Best Bet',strong:'Strong',value:'Value',flyer:'Flyer'};

function renderBet(x, pmMode){
  const card=el('div','bet'+(x.tier==='best'?' best':''));
  const top=el('div','bet-top');
  const nm=el('div','name');
  nm.appendChild(el('span','flag '+x.tier,TIER_LABEL[x.tier]||x.tier));
  nm.appendChild(document.createTextNode(x.label));
  top.appendChild(nm);
  const priceTxt = (pmMode && x.pmNote) ? x.pmNote : (x.price+(x.book?'<small>'+x.book+'</small>':''));
  top.appendChild(el('div','price',priceTxt));
  card.appendChild(top);
  if(x.legs && x.legs.length){
    const ul=el('ul','legs'); x.legs.forEach(l=>ul.appendChild(el('li',null,l))); card.appendChild(ul);
  }
  const meta=el('div','bet-meta');
  const addM=(cls,lbl,txt)=>{const m=el('div','m '+cls); m.appendChild(el('span','lbl',lbl)); m.appendChild(document.createTextNode(' '+txt)); meta.appendChild(m);};
  if(x.correlation) addM('','Correlation',x.correlation);
  if(x.mustBeTrue) addM('','Needs',x.mustBeTrue);
  if(x.edge) addM('edge','Edge',x.edge);
  if(!pmMode && x.pm && x.pmNote) addM('','Kalshi',x.pmNote.replace(/<[^>]*>/g,''));
  if(x.horizon) addM('','Settles',x.horizon);
  card.appendChild(meta);
  return card;
}

function render(pmMode){
  app.innerHTML='';
  if(pmMode) app.appendChild(el('p','pm-note','Prediction-market mode: only Kalshi-executable plays (legal in GA/CA — no sportsbook required). Analysis unchanged.'));
  const gw=el('div','games');
  (DATA.games||[]).forEach((g,gi)=>{
    const c=el('article','game'); c.style.animationDelay=(gi*.09)+'s';
    const head=el('div','g-head');
    const when=el('div','when', g.ko+' &middot; '+g.venue);
    if(g.sport) when.appendChild(el('span','sport-tag',g.sport));
    if(g.status==='LIVE'){
      const lb=el('span','badge-live'); lb.appendChild(el('span','dot')); lb.appendChild(document.createTextNode('LIVE'));
      when.appendChild(lb);
    }
    head.appendChild(when);
    head.appendChild(el('h2',null,g.matchup.replace(/\s+(vs\.?|v|—|-)\s+/i,' <span class="at">v</span> ')));
    if(g.status==='LIVE' && g.liveState) head.appendChild(el('div','livestate',g.liveState));
    c.appendChild(head);

    const bd=el('div','g-body');
    const blk=(cls,k,vHtml)=>{const b=el('div','blk '+cls); b.appendChild(el('div','k',k)); b.appendChild(el('div','v',vHtml)); bd.appendChild(b); return b;};

    if(g.lineups) blk('','Lineups &amp; News', g.lineups);
    if(g.script)  blk('script','The Script', g.script);
    if(g.altFutures){
      const b=el('div','blk alt'); b.appendChild(el('div','k','Alternative Futures'));
      const v=el('div','v');
      (Array.isArray(g.altFutures)?g.altFutures:[g.altFutures]).forEach(a=>v.appendChild(el('div','alt-branch',a)));
      b.appendChild(v); bd.appendChild(b);
    }

    const bets = (g.bets||[]).filter(x=>!pmMode || x.pm);
    const b=el('div','blk board');
    b.appendChild(el('div','k','The Board — '+bets.length+' play'+(bets.length===1?'':'s')));
    if(bets.length){
      const list=el('div','bets');
      [...bets].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>list.appendChild(renderBet(x,pmMode)));
      b.appendChild(list);
    } else {
      b.appendChild(el('div','nopm', pmMode?'No Kalshi-executable edge in this match — analysis above still stands.':'No plays passed the edge bar.'));
    }
    bd.appendChild(b);
    c.appendChild(bd); gw.appendChild(c);
  });
  app.appendChild(gw);

  if(DATA.futures && DATA.futures.length){
    const f=el('section','futures');
    const fh=el('div','f-head');
    fh.appendChild(el('h2',null,'Futures Board'));
    fh.appendChild(el('div','sub','Tournament-level positions on Kalshi — tracked nightly in the ledger until they settle.'));
    f.appendChild(fh);
    const fb=el('div','f-body');
    const list=el('div','bets');
    [...DATA.futures].sort((a,z)=>(TIER_ORDER[a.tier]??9)-(TIER_ORDER[z.tier]??9)).forEach(x=>{
      const card=renderBet({...x, book:x.ticker, pm:true}, false);
      list.appendChild(card);
    });
    fb.appendChild(list); f.appendChild(fb); app.appendChild(f);
  }
}

// tabs
const tabs=el('div','tabs');
const tAll=el('button','tab on','All books');
const tPM=el('button','tab','Prediction markets');
tAll.onclick=()=>{tAll.classList.add('on');tPM.classList.remove('on');render(false);};
tPM.onclick=()=>{tPM.classList.add('on');tAll.classList.remove('on');render(true);};
tabs.appendChild(tAll); tabs.appendChild(tPM);
document.getElementById('rc-slot').appendChild(tabs);
render(false);
</script>
</body>
